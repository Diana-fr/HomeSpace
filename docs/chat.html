<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="/config.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HomeSpace - Семейный чат</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #dfefff 0%, #d4e9ff 40%, #eaf4ff 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
            color: #33465d;
        }

        .back-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(140,190,255,0.35);
            border-radius: 40px;
            padding: 10px 20px;
            color: #33465d;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-app { display: flex; height: 100vh; position: relative; z-index: 10; }

        /* САЙДБАР - общие стили */
        .chat-sidebar {
            width: 300px;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(18px);
            border-right: 1px solid rgba(140,190,255,0.25);
            display: flex;
            flex-direction: column;
            z-index: 200;
            flex-shrink: 0;
        }

        /* ДЕСКТОП - сайдбар всегда виден, но есть кнопка сворачивания */
        @media (min-width: 769px) {
            .chat-sidebar {
                position: relative;
                transition: width 0.3s ease;
            }
            .chat-sidebar.collapsed {
                width: 0;
                overflow: hidden;
                padding: 0;
                margin: 0;
            }
            .sidebar-collapse-btn {
                position: absolute;
                right: -12px;
                top: 50%;
                background: white;
                border: 1px solid #6fbaff;
                border-radius: 50%;
                width: 24px;
                height: 24px;
                cursor: pointer;
                z-index: 210;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
            }
            .expand-sidebar-btn {
                display: none;
                position: fixed;
                left: 12px;
                top: 80px;
                background: rgba(255,255,255,0.9);
                border: 1px solid #6fbaff;
                border-radius: 30px;
                padding: 8px 16px;
                cursor: pointer;
                z-index: 210;
                font-size: 14px;
            }
            .chat-sidebar.collapsed ~ .expand-sidebar-btn {
                display: flex;
            }
            .burger-menu {
                display: none !important;
            }
            .mobile-close-btn {
                display: none !important;
            }
        }

        /* МОБИЛЬНЫЕ - сайдбар выезжает по бургеру */
        @media (max-width: 768px) {
            .chat-sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 200;
                width: 280px;
                box-shadow: 4px 0 25px rgba(0,0,0,0.2);
            }
            .chat-sidebar.open {
                transform: translateX(0);
            }
            .burger-menu {
                display: flex !important;
                background: rgba(255,255,255,0.9);
                border: 1px solid #6fbaff;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                align-items: center;
                justify-content: center;
                font-size: 22px;
                cursor: pointer;
            }
            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.3);
                z-index: 150;
                display: none;
            }
            .sidebar-overlay.active {
                display: block;
            }
            .sidebar-collapse-btn {
                display: none !important;
            }
            .expand-sidebar-btn {
                display: none !important;
            }
        }

        .sidebar-header {
            padding: 60px 20px 24px 20px;
            border-bottom: 1px solid rgba(140,190,255,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            padding: 20px;
            background: rgba(180,220,255,0.25);
            border-bottom: 1px solid rgba(140,190,255,0.25);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #a8d8ff, #ffffff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: all 0.2s ease;
        }

        .user-item:hover {
            background: rgba(140,190,255,0.18);
        }

        .user-item-avatar {
            width: 40px;
            height: 40px;
            background: rgba(120,180,255,0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            overflow: hidden;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(10px);
            min-width: 0;
        }

        .chat-header {
            background: rgba(255,255,255,0.6);
            border-bottom: 1px solid rgba(140,190,255,0.25);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 70%;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            background: rgba(120,180,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message-content {
            background: rgba(255,255,255,0.75);
            padding: 10px 14px;
            border-radius: 18px;
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #cfe6ff, #e6f3ff);
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(120,180,255,0.15);
            border-radius: 20px;
            padding: 8px 12px;
            flex-wrap: wrap;
        }

        .voice-play-btn {
            background: #6fbaff;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 16px;
            color: white;
        }

        .chat-input-area {
            padding: 15px 20px;
            background: rgba(255,255,255,0.6);
            border-top: 1px solid rgba(140,190,255,0.25);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.85);
            border: 1px solid rgba(140,190,255,0.35);
            border-radius: 24px;
            padding: 12px 18px;
            resize: none;
            outline: none;
        }

        .send-btn, .voice-btn {
            background: white;
            border: 1px solid #6fbaff;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            font-size: 20px;
        }

        .send-btn {
            background: #6fbaff;
            color: white;
        }

        #stop-audio-btn {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #6fbaff;
            border: 2px solid white;
            color: white;
            font-size: 24px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10000;
        }

        @media (max-width: 768px) {
            .chat-header { padding: 12px 16px; padding-top: 56px; }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='/'">← Назад в меню</button>
    <div id="stop-audio-btn" onclick="stopAllAudio()">⏹️</div>

    <div class="chat-app">
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <div class="chat-sidebar" id="chat-sidebar">
            <div class="sidebar-header">
                <div>
                    <h2>Семейный чат</h2>
                    <p>Общайтесь всей семьёй</p>
                </div>
                <button class="mobile-close-btn" id="mobile-close-sidebar" style="background:none;border:none;font-size:24px;cursor:pointer;">✕</button>
            </div>
            <div class="user-info" id="user-info">
                <div class="user-avatar" id="user-avatar"></div>
                <div class="user-details">
                    <div class="user-name" id="user-name">Загрузка...</div>
                    <div class="user-role" id="user-role"></div>
                </div>
            </div>
            <div class="users-list" id="users-list">Загрузка...</div>
        </div>

        <!-- Кнопка разворачивания на десктопе -->
        <button class="expand-sidebar-btn" id="expand-sidebar-btn">👥 Показать чаты</button>

        <div class="chat-main">
            <div class="chat-header">
                <div class="chat-title">
                    <button class="burger-menu" id="burger-menu-btn">☰</button>
                    <span id="chat-title-text">Семейный чат</span>
                </div>
                <div class="header-actions">
                    <button class="notification-btn" id="enable-notifications-btn" style="background:none;border:none;font-size:20px;cursor:pointer;">🔔</button>
                    <button class="refresh-btn" id="refresh-btn" style="background:none;border:none;font-size:20px;cursor:pointer;">⟳</button>
                </div>
            </div>
            <div class="messages-area" id="messages-area">💬 Выберите чат</div>
            <div class="chat-input-area">
                <textarea class="chat-input" id="message-input" placeholder="Введите сообщение..." rows="1"></textarea>
                <button class="voice-btn" id="voice-record-btn">🎤</button>
                <button class="send-btn" id="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.API_URL;
        const BOT_ID = '00000000-0000-0000-0000-000000000001';
        let token = localStorage.getItem('homespace_token');
        let currentUser = null;
        let currentChat = { type: 'family', userId: null, userName: null };
        let messages = [], users = [], socket = null;
        let currentAudio = null;
        let welcomeShown = false;
        let isSidebarCollapsed = false;

        function escapeHtml(text) { if (!text) return ''; const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

        function stopAllAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
            document.getElementById('stop-audio-btn').style.display = 'none';
        }

        // ПРОСТАЯ ФУНКЦИЯ ВОСПРОИЗВЕДЕНИЯ - РАБОТАЕТ НА ТЕЛЕФОНЕ
        window.playVoiceMessage = function(url, btn) {
            stopAllAudio();
            
            // Получаем полный URL
            let audioUrl = url;
            if (url && url.startsWith('/uploads/')) {
                audioUrl = (window.BASE_URL || '') + url;
            }
            
            console.log('Воспроизведение:', audioUrl);
            
            if (btn) btn.textContent = '⏳';
            
            // ПРОСТОЙ СПОСОБ - обычный Audio
            const audio = new Audio(audioUrl);
            audio.playbackRate = 1.0;
            currentAudio = audio;
            
            audio.play().then(() => {
                console.log('Играет!');
                if (btn) btn.textContent = '⏸️';
                document.getElementById('stop-audio-btn').style.display = 'flex';
            }).catch(err => {
                console.error('Ошибка:', err);
                if (btn) btn.textContent = '▶️';
                alert('Нажмите на сообщение ещё раз для прослушивания');
            });
            
            audio.onended = () => {
                if (btn) btn.textContent = '▶️';
                document.getElementById('stop-audio-btn').style.display = 'none';
                currentAudio = null;
            };
        };

        // Загрузка пользователя
        async function loadCurrentUser() {
            const saved = localStorage.getItem('homespace_currentUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('user-name').textContent = currentUser.name || 'Пользователь';
                document.getElementById('user-avatar').innerHTML = currentUser.avatar || '👤';
                document.getElementById('user-role').textContent = currentUser.role === 'parent' ? 'Родитель' : (currentUser.role === 'user' ? 'Пользователь' : 'Ребёнок');
            }
        }

        // Отображение сообщений
        function renderMessages() {
            const area = document.getElementById('messages-area');
            if (!area) return;
            if (!messages || !messages.length) {
                area.innerHTML = '<div style="text-align:center;padding:60px;">💬 Нет сообщений</div>';
                return;
            }
            
            area.innerHTML = '';
            messages.forEach(msg => {
                const isOwn = msg.user_id === currentUser?.id;
                const isBot = msg.user_id === BOT_ID;
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const messageText = escapeHtml(msg.message || '');
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isOwn ? 'own' : ''}`;
                
                let contentHtml = '';
                
                // Голосовое сообщение
                if (msg.message_type === 'voice' && msg.voice_url) {
                    contentHtml = `
                        <div class="voice-message">
                            <button class="voice-play-btn" onclick="playVoiceMessage('${msg.voice_url}', this)">▶️</button>
                            <span>${msg.voice_duration || 'Голосовое'}</span>
                        </div>
                    `;
                } else {
                    contentHtml = `<div class="message-text">${messageText}</div>`;
                }
                
                msgDiv.innerHTML = `
                    <div class="message-avatar">${isBot ? '🤖' : (isOwn ? (currentUser?.avatar || '👤') : (msg.user_avatar || '👤'))}</div>
                    <div class="message-content">
                        ${!isOwn && !isBot ? `<div style="font-size:12px;font-weight:600;">${escapeHtml(msg.user_name)}</div>` : ''}
                        ${isBot ? '<div style="font-size:12px;font-weight:600;">🤖 Бот</div>' : ''}
                        ${contentHtml}
                        <div style="font-size:10px;color:gray;margin-top:4px;">${time}</div>
                    </div>
                `;
                area.appendChild(msgDiv);
            });
            area.scrollTop = area.scrollHeight;
        }

        // Отправка сообщения
        async function sendMessage() {
            const inp = document.getElementById('message-input');
            const msg = inp.value.trim();
            if (!msg) return;
            inp.value = '';
            
            try {
                await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({
                        message: msg,
                        type: currentChat.type,
                        recipientId: currentChat.type === 'private' ? currentChat.userId : null
                    })
                });
                await loadMessages();
            } catch (e) { console.error(e); }
        }

        // Загрузка сообщений
        async function loadMessages() {
            if (!currentUser?.familyId) return;
            try {
                let url = `${API_URL}/chat?`;
                if (currentChat.type === 'private') {
                    url += `type=private&withUserId=${currentChat.userId}`;
                } else {
                    url += 'type=family';
                }
                const r = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                if (r.ok) {
                    messages = await r.json();
                    renderMessages();
                }
            } catch (e) { console.error(e); }
        }

        // Загрузка пользователей
        async function loadUsers() {
            if (!currentUser?.familyId) return;
            try {
                const r = await fetch(`${API_URL}/families/${currentUser.familyId}/members`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                users = r.ok ? await r.json() : [];
                users.push({ id: BOT_ID, name: '🤖 Бот-помощник', avatar: '🤖', role: 'bot' });
                
                const container = document.getElementById('users-list');
                if (!container) return;
                
                container.innerHTML = `
                    <div class="user-item" onclick="switchToFamilyChat()">
                        <div class="user-item-avatar">👨‍👩‍👧</div>
                        <div>Семейный чат</div>
                    </div>
                `;
                
                users.filter(u => u.id !== currentUser?.id).forEach(u => {
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <div class="user-item-avatar">${u.id === BOT_ID ? '🤖' : (u.avatar || '👤')}</div>
                        <div>${escapeHtml(u.name)}</div>
                    `;
                    div.onclick = () => switchToPrivateChat(u);
                    container.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        // Переключение чатов
        window.switchToFamilyChat = function() {
            currentChat = { type: 'family', userId: null, userName: null };
            document.getElementById('chat-title-text').textContent = 'Семейный чат';
            loadMessages();
            closeSidebar();
        };

        window.switchToPrivateChat = function(user) {
            currentChat = { type: 'private', userId: user.id, userName: user.name };
            document.getElementById('chat-title-text').textContent = `Чат с ${user.name}`;
            loadMessages();
            closeSidebar();
            if (user.id === BOT_ID && !welcomeShown) {
                welcomeShown = true;
                setTimeout(() => {
                    const botMsg = {
                        id: 'bot_welcome',
                        user_id: BOT_ID,
                        user_name: 'Бот',
                        message: '👋 Привет! Я бот-помощник. Напиши "помощь" чтобы узнать что я умею.',
                        created_at: new Date().toISOString()
                    };
                    messages.push(botMsg);
                    renderMessages();
                }, 500);
            }
        };

        // ========== УПРАВЛЕНИЕ САЙДБАРОМ ==========
        function openSidebar() {
            if (window.innerWidth <= 768) {
                document.getElementById('chat-sidebar').classList.add('open');
                document.getElementById('sidebar-overlay').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeSidebar() {
            if (window.innerWidth <= 768) {
                document.getElementById('chat-sidebar').classList.remove('open');
                document.getElementById('sidebar-overlay').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        function toggleSidebar() {
            if (window.innerWidth <= 768) {
                const sidebar = document.getElementById('chat-sidebar');
                if (sidebar.classList.contains('open')) {
                    closeSidebar();
                } else {
                    openSidebar();
                }
            }
        }

        // Сворачивание на десктопе
        function collapseSidebarDesktop() {
            if (window.innerWidth > 768) {
                document.getElementById('chat-sidebar').classList.add('collapsed');
                isSidebarCollapsed = true;
                localStorage.setItem('sidebar_collapsed', 'true');
            }
        }

        function expandSidebarDesktop() {
            if (window.innerWidth > 768) {
                document.getElementById('chat-sidebar').classList.remove('collapsed');
                isSidebarCollapsed = false;
                localStorage.setItem('sidebar_collapsed', 'false');
            }
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        async function init() {
            await loadCurrentUser();
            if (!token || !currentUser) {
                window.location.href = '/';
                return;
            }
            
            await loadUsers();
            await loadMessages();
            
            // Восстанавливаем состояние сайдбара на десктопе
            const saved = localStorage.getItem('sidebar_collapsed');
            if (saved === 'true' && window.innerWidth > 768) {
                document.getElementById('chat-sidebar').classList.add('collapsed');
            }
            
            // Кнопки
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('refresh-btn').onclick = () => loadMessages();
            document.getElementById('stop-audio-btn').onclick = stopAllAudio;
            
            // Сайдбар
            const burgerBtn = document.getElementById('burger-menu-btn');
            const closeBtn = document.getElementById('mobile-close-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const expandBtn = document.getElementById('expand-sidebar-btn');
            
            if (burgerBtn) burgerBtn.onclick = toggleSidebar;
            if (closeBtn) closeBtn.onclick = closeSidebar;
            if (overlay) overlay.onclick = closeSidebar;
            if (expandBtn) expandBtn.onclick = expandSidebarDesktop;
            
            // Кнопка сворачивания на десктопе
            const collapseBtn = document.createElement('button');
            collapseBtn.textContent = '◀';
            collapseBtn.className = 'sidebar-collapse-btn';
            collapseBtn.onclick = collapseSidebarDesktop;
            document.getElementById('chat-sidebar').appendChild(collapseBtn);
            
            // Голосовые сообщения
            const voiceBtn = document.getElementById('voice-record-btn');
            let mediaRecorder = null;
            let audioChunks = [];
            
            voiceBtn.onmousedown = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = async () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const fd = new FormData();
                        fd.append('audio', blob, 'voice.webm');
                        fd.append('type', currentChat.type);
                        if (currentChat.type === 'private') fd.append('recipientId', currentChat.userId);
                        await fetch(`${API_URL}/chat/voice`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}` },
                            body: fd
                        });
                        loadMessages();
                        stream.getTracks().forEach(t => t.stop());
                    };
                    mediaRecorder.start();
                    voiceBtn.classList.add('recording');
                    voiceBtn.textContent = '⏹️';
                } catch(e) { alert('Нет доступа к микрофону'); }
            };
            
            voiceBtn.onmouseup = () => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                    voiceBtn.classList.remove('recording');
                    voiceBtn.textContent = '🎤';
                }
            };
            
            voiceBtn.ontouchend = (e) => {
                e.preventDefault();
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                    voiceBtn.classList.remove('recording');
                    voiceBtn.textContent = '🎤';
                }
            };
            
            document.getElementById('message-input').addEventListener('keypress', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // Стартовый чат
            if (window.innerWidth <= 768) closeSidebar();
            else switchToFamilyChat();
        }
        
        init();
    </script>
</body>
</html>
