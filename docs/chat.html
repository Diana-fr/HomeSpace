<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="/config.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HomeSpace - Семейный чат</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
   <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #dfefff 0%, #d4e9ff 40%, #eaf4ff 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
            color: #33465d;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(120, 180, 255, 0.18), transparent 55%);
            animation: pulse 10s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(180, 220, 255, 0.18), transparent 55%);
            animation: pulse 14s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.25; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.08); }
        }

        /* Глобальная кнопка назад - исправлена, чтобы не перекрывала сайдбар */
        .global-back-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(140,190,255,0.5);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            border-radius: 40px;
            padding: 10px 20px;
            color: #33465d;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .global-back-btn:hover { background: rgba(235,245,255,0.95); transform: translateX(-3px); }

        .chat-app { display: flex; height: 100vh; position: relative; z-index: 10; }

        /* ========== САЙДБАР ========== */
        .chat-sidebar {
            width: 300px;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(18px);
            border-right: 1px solid rgba(140,190,255,0.25);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, width 0.2s ease;
            z-index: 200;
            overflow-x: hidden;
        }

        .sidebar-header {
            padding: 70px 20px 24px 20px;
            border-bottom: 1px solid rgba(140,190,255,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        /* Контейнер для заголовка — теперь не перекрывается кнопкой */
        .sidebar-header-content {
            flex: 1;
        }
        .sidebar-header-content h2 { 
            color: #33465d; 
            font-size: 20px; 
            font-weight: 700; 
            margin: 0;
            line-height: 1.3;
        }
        .sidebar-header-content p { 
            color: rgba(51,70,93,0.6); 
            font-size: 12px; 
            margin-top: 4px;
        }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(3px);
            z-index: 150;
            display: none;
        }
        .sidebar-overlay.active { display: block; }

        .sidebar-collapse-btn {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(140,190,255,0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #33465d;
            transition: all 0.2s ease;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .sidebar-collapse-btn:hover { background: rgba(235,245,255,0.95); transform: scale(1.05); }

        /* Бургер-меню для мобилок — ВИДИМОЕ */
        .burger-menu {
            background: rgba(255,255,255,0.85);
            border: 1px solid rgba(140,190,255,0.5);
            border-radius: 30px;
            padding: 8px 16px;
            height: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #33465d;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .burger-menu:hover { background: rgba(235,245,255,0.95); }

        /* Свёрнутый сайдбар на десктопе */
        .chat-sidebar.collapsed {
            width: 65px;
            min-width: 65px;
        }
        .chat-sidebar.collapsed .sidebar-header {
            padding: 16px 8px;
            justify-content: center;
        }
        .chat-sidebar.collapsed .sidebar-header-content,
        .chat-sidebar.collapsed .user-info,
        .chat-sidebar.collapsed .user-item-info,
        .chat-sidebar.collapsed .unread-badge {
            display: none;
        }
        .chat-sidebar.collapsed .user-item {
            justify-content: center;
            padding: 14px 0;
        }
        .chat-sidebar.collapsed .user-item-avatar {
            margin: 0;
        }
        .chat-sidebar.collapsed .user-item.active {
            border-left: 0;
            border-radius: 50%;
        }
        /* При наведении раскрывается */
        .chat-sidebar.collapsed:hover {
            width: 300px;
        }
        .chat-sidebar.collapsed:hover .sidebar-header-content {
            display: block;
        }
        .chat-sidebar.collapsed:hover .user-info {
            display: flex;
        }
        .chat-sidebar.collapsed:hover .user-item-info {
            display: flex;
        }
        .chat-sidebar.collapsed:hover .unread-badge {
            display: flex;
        }
        .chat-sidebar.collapsed:hover .user-item {
            justify-content: flex-start;
            padding: 12px 15px;
        }

        /* ========== ДЕСКТОП (шире 768) ========== */
        @media (min-width: 769px) {
            .chat-sidebar {
                transform: translateX(0) !important;
                position: relative;
            }
            .sidebar-overlay {
                display: none !important;
            }
            .mobile-close-sidebar {
                display: none !important;
            }
            .burger-menu {
                display: none !important;
            }
            .chat-header {
                padding-left: 25px !important;
            }
                /* Скрываем синюю кнопку на ноутбуке */
            #simple-open-btn {
                display: none !important;
            }
        }

        /* ========== МОБИЛЬНЫЕ (до 768) ========== */
        @media (max-width: 768px) {
            .chat-sidebar { 
                position: fixed; 
                left: -280px;
                top: 0; 
                bottom: 0; 
                z-index: 200;
                width: 280px;
                box-shadow: 4px 0 25px rgba(0,0,0,0.25);
                transition: left 0.25s ease;
            }
            .chat-sidebar.open { 
                left: 0 !important;
            }
            .chat-main { 
                width: 100%; 
            }
            /* Бургер ВИДИМ на мобилках */
            .burger-menu { 
                display: flex; 
            }
            .sidebar-collapse-btn { 
                display: none !important; 
            }
            .mobile-close-sidebar {
                display: flex !important;
                background: rgba(140,190,255,0.2);
                border-radius: 30px;
                width: 36px;
                height: 36px;
                align-items: center;
                justify-content: center;
                border: none;
                cursor: pointer;
                font-size: 18px;
                color: #33465d;
                flex-shrink: 0;
            }
            .mobile-close-sidebar:hover {
                background: rgba(140,190,255,0.4);
            }
            /* Хедер чата на мобилках — чтобы кнопка "Назад" из меню не мешала */
            .chat-header { 
                padding: 12px 16px; 
                padding-top: 56px; 
                padding-left: 16px;
                position: relative;
                z-index: 20;
            }
            .message { 
                max-width: 85%; 
            }
            .chat-input-area { 
                padding: 12px 14px; 
            }
            .send-btn, .voice-btn { 
                width: 42px; 
                height: 42px; 
                font-size: 18px; 
            }
            /* Скрываем глобальную кнопку назад на мобилках (она там не нужна, есть своя) */
            .global-back-btn {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .sidebar-header {
                padding: 60px 16px 20px 16px;
            }
            .sidebar-header-content h2 {
                font-size: 18px;
            }
            .sidebar-header-content p {
                font-size: 11px;
            }
            .user-info {
                padding: 16px;
            }
            .user-avatar {
                width: 40px;
                height: 40px;
                font-size: 24px;
            }
            .user-name {
                font-size: 14px;
            }
            .user-role {
                font-size: 10px;
            }
            .user-item {
                padding: 10px 12px;
                gap: 10px;
            }
            .user-item-avatar {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            .user-item-name {
                font-size: 13px;
            }
            .chat-header {
                padding: 10px 12px;
                padding-top: 50px;
            }
            .chat-title {
                font-size: 16px;
                gap: 8px;
            }
            .burger-menu {
                padding: 6px 12px;
                height: 36px;
                font-size: 13px;
            }
            .message {
                max-width: 90%;
                gap: 8px;
            }
            .message-avatar {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
            .message-content {
                padding: 8px 12px;
            }
            .message-text {
                font-size: 13px;
            }
            .message-sender {
                font-size: 11px;
            }
            .message-time {
                font-size: 9px;
            }
            .chat-input-area {
                padding: 10px 12px;
                gap: 8px;
            }
            .chat-input {
                padding: 10px 14px;
                font-size: 13px;
            }
            .send-btn, .voice-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
            .voice-message {
                padding: 6px 10px;
                gap: 8px;
            }
            .voice-play-btn {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            .voice-duration {
                font-size: 11px;
            }
            .speed-btn {
                padding: 2px 6px;
                font-size: 9px;
            }
            .message-actions {
                gap: 6px;
            }
            .edit-msg-btn, .delete-msg-btn, .speak-btn {
                padding: 3px 8px;
                font-size: 10px;
            }
            .bot-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
            .empty-messages {
                padding: 40px 20px;
            }
            .empty-messages div:first-child {
                font-size: 40px;
            }
        }

        @media (max-width: 380px) {
            .sidebar-header {
                padding: 55px 12px 16px 12px;
            }
            .sidebar-header-content h2 {
                font-size: 16px;
            }
            .sidebar-header-content p {
                font-size: 10px;
            }
            .burger-menu {
                padding: 4px 10px;
                font-size: 12px;
            }
            .chat-title {
                font-size: 14px;
            }
            .message {
                max-width: 95%;
            }
            .chat-input {
                font-size: 12px;
                padding: 8px 12px;
            }
            .send-btn, .voice-btn {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
        }

        @media (max-width: 360px) {
            .chat-header { 
                padding: 8px 10px; 
                padding-top: 46px; 
            }
            .messages-area { 
                padding: 12px; 
            }
            .chat-input-area { 
                padding: 8px 10px; 
                gap: 8px; 
            }
            .chat-input { 
                padding: 8px 12px; 
                font-size: 12px; 
            }
        }

        /* Остальные стили (user-info, users-list и т.д.) остаются как у тебя */
        .user-info {
            padding: 20px;
            background: linear-gradient(135deg, rgba(180,220,255,0.25), rgba(140,190,255,0.15));
            border-bottom: 1px solid rgba(140,190,255,0.25);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #a8d8ff, #ffffff);
            box-shadow: 0 4px 12px rgba(120,180,255,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }
        .user-details { flex: 1; }
        .user-name { color: #33465d; font-weight: 600; font-size: 16px; }
        .user-role { color: rgba(51,70,93,0.6); font-size: 12px; }

        .users-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: all 0.2s ease;
            position: relative;
        }
        .user-item:hover {
            background: rgba(140,190,255,0.18);
            transform: translateX(3px);
        }
        .user-item.active {
            background: linear-gradient(135deg, rgba(140,190,255,0.3), rgba(180,220,255,0.25));
            border-left: 3px solid #6fbaff;
        }
        .user-item.has-unread {
            background: rgba(140,190,255,0.2);
            animation: unreadBlink 1.1s ease-in-out infinite;
        }
        @keyframes unreadBlink { 0%,100% { box-shadow: 0 0 0 rgba(120,180,255,0); } 50% { box-shadow: 0 0 0 3px rgba(120,180,255,0.3); } }
        .unread-badge {
            background: linear-gradient(135deg, #6fbaff, #a8d8ff);
            box-shadow: 0 0 10px rgba(120,180,255,0.6);
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            padding: 0 5px;
            margin-left: 8px;
            color: #fff;
        }
        .user-item-avatar { width: 40px; height: 40px; background: rgba(120,180,255,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden; }
        .user-item-info { flex: 1; display: flex; align-items: center; gap: 5px; }
        .user-item-name { color: #33465d; font-size: 14px; font-weight: 500; }
        .user-item-role { color: rgba(51,70,93,0.6); font-size: 11px; }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(10px);
        }

        .chat-header {
            background: rgba(255,255,255,0.6);
            border-bottom: 1px solid rgba(140,190,255,0.25);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-title { color: #33465d; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .header-actions { display: flex; gap: 10px; }

        .notification-btn, .refresh-btn {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(140,190,255,0.35);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            color: #33465d;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .notification-btn:hover, .refresh-btn:hover { background: rgba(220,240,255,0.9); }
        .notification-btn.active { background: rgba(120,180,255,0.35); color: #2c5a8c; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: transparent;
        }
        .message { display: flex; gap: 12px; max-width: 70%; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #dbeeff, #ffffff);
            box-shadow: 0 4px 10px rgba(120,180,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar-image { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .avatar-initials { font-size: 14px; font-weight: 700; color: #33465d; }
        
        .message-content-wrapper { display: flex; flex-direction: column; gap: 4px; }
        
        .message-content {
            background: rgba(255,255,255,0.75);
            border: 1px solid rgba(140,190,255,0.25);
            backdrop-filter: blur(8px);
            padding: 10px 14px;
            border-radius: 18px;
        }
        .message.own .message-content {
            background: linear-gradient(135deg, #cfe6ff, #e6f3ff);
            box-shadow: 0 6px 14px rgba(120,180,255,0.3);
        }
        .message.bot .message-content {
            background: linear-gradient(135deg, #e8f3ff, #d6ebff);
            border-left: 3px solid #6fbaff;
        }
        .message-sender { font-size: 12px; font-weight: 600; color: #4a6a8a; margin-bottom: 4px; }
        .message-text { font-size: 14px; color: #2f3f55; line-height: 1.5; }
        .message-time { font-size: 10px; color: rgba(51,70,93,0.6); margin-top: 4px; text-align: right; }

        .bot-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .bot-btn {
            background: rgba(255,255,255,0.9);
            border: 1px solid #6fbaff;
            border-radius: 20px;
            padding: 8px 16px;
            color: #33465d;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .bot-btn:hover { background: #6fbaff; color: white; transform: scale(1.02); }

        .voice-message { display: flex; align-items: center; gap: 10px; background: rgba(120,180,255,0.15); border-radius: 20px; padding: 8px 12px; margin-top: 5px; flex-wrap: wrap; }
        .voice-play-btn { background: linear-gradient(135deg, #6fbaff, #a8d8ff); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 14px; color: #fff; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 2px 8px rgba(120,180,255,0.4); }
        .voice-play-btn:hover { transform: scale(1.05); }
        .voice-duration { color: rgba(51,70,93,0.7); font-size: 12px; }
        .speed-controls { display: inline-flex; gap: 6px; margin-left: 8px; flex-wrap: wrap; }
        .speed-btn { background: rgba(255,255,255,0.6); border: 1px solid rgba(120,180,255,0.5); border-radius: 14px; padding: 3px 8px; color: #5b7f9e; font-size: 10px; cursor: pointer; transition: all 0.2s ease; }
        .speed-btn:hover { background: rgba(120,180,255,0.25); color: #3f5874; border-color: #6fbaff; }
        .speed-btn.active { background: linear-gradient(135deg, #6fbaff, #a8d8ff); color: #fff; border-color: #6fbaff; }

        .chat-input-area {
            padding: 15px 20px;
            background: rgba(255,255,255,0.6);
            border-top: 1px solid rgba(140,190,255,0.25);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.85);
            border: 1px solid rgba(140,190,255,0.35);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.05);
            border-radius: 24px;
            padding: 12px 18px;
            color: #33465d;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        .chat-input:focus { border-color: #6fbaff; }
        
        .send-btn, .voice-btn {
            background: linear-gradient(135deg, #ffffff, #eaf4ff);
            border: 1px solid rgba(120,180,255,0.5);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            font-size: 20px;
            color: #33465d;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .send-btn { background: linear-gradient(135deg, #6fbaff, #a8d8ff); color: #fff; box-shadow: 0 6px 16px rgba(120,180,255,0.5); }
        .send-btn:hover { transform: scale(1.05); }
        .voice-btn { background: linear-gradient(135deg, #ffffff, #eaf4ff); }
        .voice-btn.recording { background: #d8ecff; animation: pulseRecord 1s infinite; }
        @keyframes pulseRecord { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.02); } }

        #stop-audio-btn {
            position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, #6fbaff, #a8d8ff); border: 2px solid white; color: white; font-size: 24px;
            display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 10000;
        }
        .empty-messages { text-align: center; padding: 60px 20px; color: rgba(79, 105, 136, 0.62); }

        .message-actions { display: flex; gap: 8px; margin-top: 5px; opacity: 0; transition: opacity 0.2s ease; }
        .message:hover .message-actions { opacity: 1; }
        @media (max-width: 768px) { .message-actions { opacity: 1; } }

        .edit-msg-btn, .delete-msg-btn, .speak-btn {
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(140,190,255,0.35);
            border-radius: 15px;
            padding: 4px 10px;
            color: rgba(51,70,93,0.8);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .edit-msg-btn:hover, .delete-msg-btn:hover, .speak-btn:hover {
            background: rgba(140,190,255,0.2);
            color: #2c5a8c;
            border-color: #6fbaff;

<script>
        const API_URL = window.API_URL;
        const BOT_ID = '00000000-0000-0000-0000-000000000001';
        let token = localStorage.getItem('homespace_token');
        let currentUser = null;
        let currentChat = { type: 'family', userId: null, userName: null };
        let sidebarCollapsed = false;
        let messages = [], users = [], socket = null;
        let unreadCounts = {};
        let notificationPermission = false, audioNotification = null;
        let speechSynthesis = window.speechSynthesis;
        let currentUtterance = null, currentAudio = null;
        let mediaRecorder = null, audioChunks = [], isRecording = false, recordStartTime = 0;
        let botEventsInterval = null;
        let lastBotEventTime = new Date().toISOString();
        let userInteracted = false;
        let isSoloMode = false;
        let currentSpeed = parseFloat(localStorage.getItem('voice_speed') || '1.0');
        let audioContextInitialized = false;

        function escapeHtml(text) { if (!text) return ''; const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
        
        function formatMessageDate(date) { 
            const d = new Date(date), today = new Date(); 
            if(d.toDateString() === today.toDateString()) return 'Сегодня'; 
            return d.toLocaleDateString('ru-RU', { day:'numeric', month:'long' }); 
        }
        
        function stopAllAudio() { 
            if(currentAudio){ 
                currentAudio.pause(); 
                currentAudio.currentTime=0; 
                currentAudio=null; 
            } 
            if(currentUtterance){ 
                speechSynthesis.cancel(); 
                currentUtterance=null; 
            } 
            document.getElementById('stop-audio-btn').style.display='none'; 
        }
        
        function speakText(text, btn) { 
            if(!speechSynthesis) return; 
            stopAllAudio(); 
            const utterance = new SpeechSynthesisUtterance(text); 
            utterance.lang='ru-RU'; 
            utterance.rate=1.0; 
            currentUtterance=utterance; 
            if(btn) btn.textContent='⏸️'; 
            document.getElementById('stop-audio-btn').style.display='flex'; 
            utterance.onend=()=>{ 
                if(btn) btn.textContent='🔊'; 
                currentUtterance=null; 
                document.getElementById('stop-audio-btn').style.display='none'; 
            }; 
            speechSynthesis.speak(utterance); 
        }
        
        function setSpeed(speed) { 
            currentSpeed=speed; 
            if(currentAudio) currentAudio.playbackRate=currentSpeed; 
            localStorage.setItem('voice_speed',speed); 
            document.querySelectorAll('.speed-btn').forEach(btn=>{ 
                btn.classList.remove('active'); 
                if(btn.dataset.speed===String(speed)) btn.classList.add('active'); 
            }); 
        }
        
        // ========== ИСПРАВЛЕННАЯ ФУНКЦИЯ ДЛЯ МОБИЛЬНЫХ УСТРОЙСТВ ==========
        function playVoiceMessage(url, btnElement) {
            stopAllAudio();
            
            // Получаем полный URL
            let audioUrl = url;
            if (url.startsWith('/uploads/')) {
                audioUrl = (window.BASE_URL || '') + url;
            }
            
            // Добавляем кэш-бастер
            audioUrl = audioUrl + (audioUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
            
            console.log('🎵 Воспроизведение:', audioUrl);
            
            // Меняем кнопку на "загрузка" если передан элемент
            if (btnElement) {
                btnElement.textContent = '⏳';
            }
            
            // Используем скрытый аудио элемент для лучшей совместимости с мобильными
            const audioEl = document.getElementById('hidden-audio');
            if (audioEl) {
                audioEl.src = audioUrl;
                audioEl.playbackRate = currentSpeed;
                currentAudio = audioEl;
                
                const playPromise = audioEl.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        console.log('✅ Аудио воспроизводится');
                        if (btnElement) btnElement.textContent = '⏸️';
                        document.getElementById('stop-audio-btn').style.display = 'flex';
                    }).catch(error => {
                        console.error('❌ Ошибка воспроизведения:', error);
                        if (btnElement) btnElement.textContent = '▶️';
                        
                        // Показываем кнопку для ручного запуска на iOS
                        if (error.name === 'NotAllowedError') {
                            const resumeBtn = document.createElement('button');
                            resumeBtn.textContent = '🔊 Нажмите для прослушивания';
                            resumeBtn.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:10001;padding:12px 24px;background:#6fbaff;border:none;border-radius:30px;color:white;font-size:16px;cursor:pointer;';
                            resumeBtn.onclick = () => {
                                audioEl.play();
                                resumeBtn.remove();
                            };
                            document.body.appendChild(resumeBtn);
                            setTimeout(() => resumeBtn.remove(), 10000);
                        }
                    });
                }
                
                audioEl.onended = () => {
                    if (btnElement) btnElement.textContent = '▶️';
                    document.getElementById('stop-audio-btn').style.display = 'none';
                    currentAudio = null;
                };
                
                audioEl.onerror = (e) => {
                    console.error('❌ Ошибка аудио:', e);
                    if (btnElement) btnElement.textContent = '▶️';
                    alert('Не удалось воспроизвести голосовое сообщение');
                    document.getElementById('stop-audio-btn').style.display = 'none';
                    currentAudio = null;
                };
            } else {
                // Fallback на обычный Audio
                currentAudio = new Audio(audioUrl);
                currentAudio.playbackRate = currentSpeed;
                currentAudio.play().then(() => {
                    if (btnElement) btnElement.textContent = '⏸️';
                    document.getElementById('stop-audio-btn').style.display = 'flex';
                }).catch(err => {
                    console.error(err);
                    if (btnElement) btnElement.textContent = '▶️';
                });
                currentAudio.onended = () => {
                    if (btnElement) btnElement.textContent = '▶️';
                    document.getElementById('stop-audio-btn').style.display = 'none';
                    currentAudio = null;
                };
            }
        }
        
        // Обёртка для вызова из onclick (без передачи кнопки)
        function playVoiceMessageSimple(url) {
            playVoiceMessage(url, null);
        }

        // ========== ИНИЦИАЛИЗАЦИЯ АУДИО КОНТЕКСТА ДЛЯ МОБИЛЬНЫХ ==========
        function initAudioContext() {
            if (audioContextInitialized) return;
            
            // Создаём пустой AudioContext для активации аудио на iOS
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (AudioContextClass) {
                const audioCtx = new AudioContextClass();
                // Создаём тихий звук для активации
                const buffer = audioCtx.createBuffer(1, 1, 22050);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start();
                audioCtx.suspend();
                
                // Активируем при первом касании
                const activateAudio = () => {
                    audioCtx.resume();
                    document.removeEventListener('touchstart', activateAudio);
                    document.removeEventListener('click', activateAudio);
                    console.log('🎵 Аудио контекст активирован');
                };
                document.addEventListener('touchstart', activateAudio);
                document.addEventListener('click', activateAudio);
                
                audioContextInitialized = true;
            }
            
            // Также пробуем воспроизвести тишину через обычный Audio
            const silentAudio = new Audio();
            silentAudio.volume = 0;
            silentAudio.play().catch(() => {});
        }

        // ========== ФУНКЦИЯ АВАТАРА С КЭШ-БАСТЕРОМ ==========
        function getAvatarHtml(avatar, name) {
            if (typeof avatar === 'string' && avatar.trim().length > 0) {
                const trimmed = avatar.trim();
                
                // Эмодзи или простой текст
                if (trimmed.length <= 2 && !trimmed.includes('/') && !trimmed.includes('http') && !trimmed.includes('uploads')) {
                    return `<span style="font-size:20px;">${escapeHtml(trimmed)}</span>`;
                }
                
                // Ссылка на фото с кэш-бастером
                if (trimmed.startsWith('http://') || trimmed.startsWith('https://')) {
                    const cacheBuster = `?t=${Date.now()}`;
                    return `<img class="avatar-image" src="${escapeHtml(trimmed)}${cacheBuster}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E👤%3C/text%3E%3C/svg%3E'">`;
                }
                
                // Локальный путь с кэш-бастером
                if (trimmed.includes('/uploads/') || trimmed.startsWith('/assets/uploads/')) {
                    let baseUrl = window.BASE_URL || '';
                    let src = trimmed.startsWith('/') ? baseUrl + escapeHtml(trimmed) : baseUrl + '/' + escapeHtml(trimmed);
                    const cacheBuster = `?t=${Date.now()}`;
                    return `<img class="avatar-image" src="${src}${cacheBuster}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%22.9em%22 font-size=%2290%22%3E👤%3C/text%3E%3C/svg%3E'">`;
                }
            }
            
            // Инициалы по умолчанию
            const parts = (name || '👤').trim().split(/\s+/).slice(0, 2);
            const initials = parts.map(p => p[0]?.toUpperCase() || '').join('') || 'U';
            return `<span class="avatar-initials" style="font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${escapeHtml(initials)}</span>`;
        }

        // ========== СИНХРОНИЗАЦИЯ ДАННЫХ ПОЛЬЗОВАТЕЛЯ ==========
        async function syncUserData() {
            if (!token || !currentUser) return;
            try {
                const response = await fetch(`${API_URL}/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const freshUser = await response.json();
                    if (currentUser) {
                        let updated = false;
                        if (currentUser.avatar !== freshUser.avatar) {
                            currentUser.avatar = freshUser.avatar;
                            updated = true;
                        }
                        if (currentUser.name !== freshUser.name) {
                            currentUser.name = freshUser.name;
                            updated = true;
                        }
                        currentUser.bonuses = freshUser.bonuses;
                        
                        if (updated) {
                            localStorage.setItem('homespace_currentUser', JSON.stringify(currentUser));
                            
                            const avatarEl = document.getElementById('user-avatar');
                            if (avatarEl) {
                                avatarEl.innerHTML = getAvatarHtml(currentUser.avatar, currentUser.name);
                            }
                            const nameEl = document.getElementById('user-name');
                            if (nameEl) nameEl.textContent = currentUser.name;
                            
                            await loadUsers();
                        }
                    }
                }
            } catch (error) {
                console.error('Ошибка синхронизации пользователя:', error);
            }
        }

        async function loadCurrentUser() { 
            const saved = localStorage.getItem('homespace_currentUser'); 
            if(saved){ 
                currentUser=JSON.parse(saved); 
                token=localStorage.getItem('homespace_token'); 
                document.getElementById('user-name').textContent=currentUser.name||'Пользователь'; 
                document.getElementById('user-avatar').innerHTML=getAvatarHtml(currentUser.avatar,currentUser.name); 
                document.getElementById('user-role').textContent=currentUser.role==='parent'?'Родитель':(currentUser.role==='user'?'Пользователь':'Ребёнок'); 
            } 
        }
        
        function renderMessages() {
            const area = document.getElementById('messages-area'); if(!area) return;
            if(!messages?.length){ area.innerHTML=`<div class="empty-messages"><div style="font-size:48px">💬</div><div>Нет сообщений</div></div>`; return; }
            area.innerHTML=''; let lastDate='';
            messages.forEach(msg=>{
                const dateLabel=formatMessageDate(msg.created_at);
                if(dateLabel!==lastDate){ const sep=document.createElement('div'); sep.style.cssText='text-align:center;font-size:12px;color:rgba(51,70,93,0.6);margin:6px 0 12px'; sep.textContent=dateLabel; area.appendChild(sep); lastDate=dateLabel; }
                const isOwn=msg.user_id===currentUser?.id;
                const isBot = msg.user_id === BOT_ID;
                const time=new Date(msg.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
                const cleanMsg=escapeHtml(msg.message||'');
                const displayMsg=cleanMsg.replace(/\n/g,'<br>')+(msg.is_edited&&msg.message_type!=='voice'?` <span style="font-size:10px;">(ред.)</span>`:'');
                const senderAvatar=isBot?'🤖':(isOwn?getAvatarHtml(currentUser?.avatar,currentUser?.name):getAvatarHtml(msg.user_avatar,msg.user_name));
                const msgDiv=document.createElement('div'); msgDiv.className=`message ${isOwn?'own':''} ${isBot?'bot':''}`;
                
                let buttonsHtml = '';
                if(isBot && msg.buttons && msg.buttons.length > 0) {
                    buttonsHtml = `<div class="bot-buttons">${msg.buttons.map(btn => `<button class="bot-btn" onclick="window.botAction('${btn.action}')">${btn.text}</button>`).join('')}</div>`;
                }
                
                // Для голосовых сообщений используем новую функцию с передачей кнопки
                const voiceBtnCallback = msg.message_type === 'voice' && msg.voice_url 
                    ? `onclick="playVoiceMessageWithButton('${msg.voice_url}', this)"`
                    : '';
                
                msgDiv.innerHTML = `
                    <div class="message-avatar">${senderAvatar}</div>
                    <div class="message-content-wrapper">
                        <div class="message-content">
                            ${!isOwn && !isBot ? `<div class="message-sender">${escapeHtml(msg.user_name)}</div>` : ''}
                            ${isBot ? '<div class="message-sender">🤖 Бот-помощник</div>' : ''}
                            ${msg.message_type !== 'voice' ? `<div class="message-text">${displayMsg}</div>` : ''}
                            ${msg.message_type === 'voice' && msg.voice_url ? `<div class="voice-message"><button class="voice-play-btn" ${voiceBtnCallback}>▶️</button><span class="voice-duration">${msg.voice_duration||'Голосовое'}</span><div class="speed-controls"><button class="speed-btn ${currentSpeed===0.5?'active':''}" data-speed="0.5" onclick="setSpeed(0.5)">0.5x</button><button class="speed-btn ${currentSpeed===1.0?'active':''}" data-speed="1.0" onclick="setSpeed(1.0)">1x</button><button class="speed-btn ${currentSpeed===1.5?'active':''}" data-speed="1.5" onclick="setSpeed(1.5)">1.5x</button><button class="speed-btn ${currentSpeed===2.0?'active':''}" data-speed="2.0" onclick="setSpeed(2.0)">2x</button></div></div>` : ''}
                            ${buttonsHtml}
                            <div class="message-time">${time}</div>
                        </div>
                        <div class="message-actions">
                            ${msg.message_type !== 'voice' && isOwn ? `<button class="edit-msg-btn" data-id="${msg.id}" data-message="${cleanMsg.replace(/"/g,'&quot;')}">✏️</button>` : ''}
                            ${msg.message_type !== 'voice' && !isBot ? `<button class="speak-btn" data-message="${cleanMsg.replace(/"/g,'&quot;')}">🔊</button>` : ''}
                            ${!isBot ? `<button class="delete-msg-btn" data-id="${msg.id}" data-delete-for-all="${isOwn || currentUser?.role === 'parent'}">🗑️</button>` : ''}
                        </div>
                    </div>
                `;
                area.appendChild(msgDiv);
            });
            area.querySelectorAll('.edit-msg-btn').forEach(btn=>btn.onclick=async()=>{ const newMsg=prompt('Редактировать:',btn.dataset.message); if(newMsg&&newMsg.trim()) await editMessage(btn.dataset.id,newMsg.trim()); });
            area.querySelectorAll('.delete-msg-btn').forEach(btn=>btn.onclick=async()=>{ if(confirm('Удалить?')) await deleteMessage(btn.dataset.id,btn.dataset.deleteForAll==='true'); });
            area.querySelectorAll('.speak-btn').forEach(btn=>btn.onclick=()=>speakText(btn.dataset.message,btn));
            area.scrollTop=area.scrollHeight;
        }
        
        // Глобальная функция для воспроизведения голосовых с кнопкой
        window.playVoiceMessageWithButton = function(url, btn) {
            playVoiceMessage(url, btn);
        };
        
        window.botAction = async function(action) {
            if (action === 'help') {
                // Убираем проверку welcomeShown
                const welcomeMsg = {
                    id: 'bot_welcome_' + Date.now(),
                    user_id: BOT_ID,
                    user_name: '🤖 Бот-помощник',
                    message: '👋 Привет! Я бот-помощник. Вот что я умею:',
                    type: 'bot',
                    created_at: new Date().toISOString(),
                    buttons: [
                        { text: '📊 Статистика', action: 'stats_personal' },
                        { text: '💰 Баланс', action: 'balance' },
                        { text: '👨‍👩‍👧 Семья', action: 'stats_family' }
                    ]
                };
                messages.push(welcomeMsg);
                renderMessages();
                return;
            }
            
            let response = '', buttons = [];
            if (action === 'stats_personal') {
                const s = await loadPersonalStats();
                response = `📊 Твоя статистика:\n📋 Заданий: ${s.totalTasks}\n✅ Выполнено: ${s.completedTasks}\n💰 Баланс: ${s.currentBalance}`;
                buttons = [{ text: '🔄 Обновить', action: 'stats_personal' }, { text: '👨‍👩‍👧 Семья', action: 'stats_family' }];
            } 
            else if (action === 'stats_family') {
                const s = await loadFamilyStats();
                response = `👨‍👩‍👧 Семья:\n👥 Участников: ${s.membersCount}\n📋 Заданий: ${s.totalTasks}\n✅ Выполнено: ${s.completedTasks}`;
                if (s.topMembers) response += `\n\n🏆 Топ:\n${s.topMembers}`;
                buttons = [{ text: '📊 Личная', action: 'stats_personal' }];
            } 
            else if (action === 'balance') {
                response = `💰 Твой баланс: ${currentUser?.bonuses || 0} бонусов`;
                buttons = [{ text: '📊 Статистика', action: 'stats_personal' }];
            } 
            else {
                response = `👋 Привет! Я бот-помощник. Напиши: баланс, статистика, семья`;
                buttons = [
                    { text: '📊 Статистика', action: 'stats_personal' },
                    { text: '💰 Баланс', action: 'balance' },
                    { text: '👨‍👩‍👧 Семья', action: 'stats_family' }
                ];
            }
            addBotMessage(response, buttons);
        };
        
        function addBotMessage(text,buttons=[]){ const msg={ id:'bot_'+Date.now(), user_id:BOT_ID, user_name:'🤖 Бот-помощник', message:text, message_type:'text', type:'bot', created_at:new Date().toISOString(), buttons }; messages.push(msg); renderMessages(); }
        
        async function loadPersonalStats() { try { const r=await fetch(`${API_URL}/tasks?`,{headers:{'Authorization':`Bearer ${token}`}}); const tasks=r.ok?await r.json():[]; const my=tasks.filter(t=>t.assigned_to===currentUser?.id); return { totalTasks:my.length, completedTasks:my.filter(t=>t.status==='completed').length, currentBalance:currentUser?.bonuses||0 }; } catch(e){ return { totalTasks:0, completedTasks:0, currentBalance:0 }; } }
        async function loadFamilyStats() { try { const r=await fetch(`${API_URL}/families/${currentUser.familyId}/members`,{headers:{'Authorization':`Bearer ${token}`}}); const members=r.ok?await r.json():[]; const t=await fetch(`${API_URL}/tasks?`,{headers:{'Authorization':`Bearer ${token}`}}); const tasks=t.ok?await t.json():[]; const sorted=[...members].sort((a,b)=>(b.bonuses||0)-(a.bonuses||0)).slice(0,5); const top=sorted.map((m,i)=>`${i+1}. ${m.name}: ${m.bonuses||0}💰`).join('\n'); return { membersCount:members.length, totalTasks:tasks.length, completedTasks:tasks.filter(t=>t.status==='completed').length, topMembers:top }; } catch(e){ return { membersCount:0, totalTasks:0, completedTasks:0, topMembers:'' }; } }
        
       async function sendMessage() { const inp=document.getElementById('message-input'); const msg=inp.value.trim(); if(!msg) return; inp.value=''; if(socket?.connected) socket.emit('send-message',{ familyId:currentUser.familyId, userId:currentUser.id, message:msg, type:currentChat.type, recipientId:currentChat.type==='private'?currentChat.userId:null }); else await fetch(`${API_URL}/chat`,{ method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({message:msg, type:currentChat.type, recipientId:currentChat.type==='private'?currentChat.userId:null}) }).then(()=>loadMessages()); if(currentChat.userId===BOT_ID) { setTimeout(() => { const hasWelcome = messages.some(m => m.user_id === BOT_ID && m.message && m.message.includes('Привет!')); if (!hasWelcome) { window.botAction('help'); } }, 300); } }
        async function editMessage(id,newMsg) { try { await fetch(`${API_URL}/chat/${id}`,{ method:'PATCH', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({message:newMsg}) }); loadMessages(); } catch(e){ alert('Ошибка'); } }
        async function deleteMessage(id,forAll) { try { await fetch(`${API_URL}/chat/${id}`,{ method:'DELETE', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({deleteForAll:forAll}) }); loadMessages(); } catch(e){ alert('Ошибка'); } }
        
        function updateUnreadIndicators() { document.querySelectorAll('.user-item').forEach(item=>{ const chatId=item.dataset.chatId; const count=unreadCounts[chatId]||0; const badge=item.querySelector('.unread-badge'); if(count>0){ item.classList.add('has-unread'); if(badge) badge.textContent=count>99?'99+':count; else{ const b=document.createElement('span'); b.className='unread-badge'; b.textContent=count; item.querySelector('.user-item-info')?.appendChild(b); } } else{ item.classList.remove('has-unread'); if(badge) badge.remove(); } }); if(currentUser?.id) localStorage.setItem(`homespace_unread_${currentUser.id}`,JSON.stringify(unreadCounts)); }
        function markAsRead(chatId){ unreadCounts[chatId]=0; updateUnreadIndicators(); if(currentUser?.id) localStorage.setItem(`homespace_unread_${currentUser.id}`,JSON.stringify(unreadCounts)); }
        
        function connectSocket() { if(!currentUser?.familyId) return; socket=io(window.WS_URL,{ withCredentials:true }); socket.on('connect',()=>socket.emit('join-family',{ familyId:currentUser.familyId, userId:currentUser.id, userName:currentUser.name, userAvatar:currentUser.avatar, token })); socket.on('new-message',msg=>{ const chatId=msg.type==='family'?'family':(msg.user_id===currentUser.id?msg.recipient_id:msg.user_id); const isRelevant=(currentChat.type==='family'&&(msg.type==='family'||msg.type==='bot'))||(currentChat.type==='private'&&((msg.user_id===currentUser.id&&msg.recipient_id===currentChat.userId)||(msg.user_id===currentChat.userId&&msg.recipient_id===currentUser.id))); if(isRelevant){ messages.push(msg); renderMessages(); } else if(msg.user_id!==currentUser.id){ unreadCounts[chatId]=(unreadCounts[chatId]||0)+1; updateUnreadIndicators(); if(document.hidden) new Notification('💬 Новое сообщение',{ body:msg.message }); } if(msg.user_id!==currentUser?.id&&userInteracted) speakText(msg.message,null); }); }
        
        async function startVoiceRecording() { try { const stream=await navigator.mediaDevices.getUserMedia({ audio:true }); const options = {}; if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) { options.mimeType = 'audio/webm;codecs=opus'; } else if (MediaRecorder.isTypeSupported('audio/mp4;codecs=mp4a.40.2')) { options.mimeType = 'audio/mp4;codecs=mp4a.40.2'; } else if (MediaRecorder.isTypeSupported('audio/mp4')) { options.mimeType = 'audio/mp4'; } mediaRecorder=new MediaRecorder(stream, options); audioChunks=[]; mediaRecorder.ondataavailable=e=>audioChunks.push(e.data); mediaRecorder.onstop=async()=>{ const blob=new Blob(audioChunks,{type:options.mimeType||'audio/webm'}); const fd=new FormData(); fd.append('audio',blob,'voice.'+(options.mimeType?.includes('mp4')?'m4a':'webm')); fd.append('type',currentChat.type); if(currentChat.type==='private') fd.append('recipientId',currentChat.userId); try{ await fetch(`${API_URL}/chat/voice`,{ method:'POST', headers:{'Authorization':`Bearer ${token}`}, body:fd }); loadMessages(); }catch(e){} stream.getTracks().forEach(t=>t.stop()); }; mediaRecorder.start(); isRecording=true; recordStartTime=Date.now(); document.getElementById('voice-record-btn').classList.add('recording'); } catch(e){ alert('Нет доступа к микрофону'); } }
        function stopVoiceRecording() { if(mediaRecorder&&isRecording){ mediaRecorder.stop(); isRecording=false; document.getElementById('voice-record-btn').classList.remove('recording'); } }
        // Добавь ПЕРЕД функцией loadMessages()
async function removeCompletedTaskMessages() {
    if (!currentUser?.familyId) return;
    
    try {
        // Получаем все выполненные задания
        const response = await fetch(`${API_URL}/tasks?status=completed`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const completedTasks = await response.json();
        
        // Получаем ID выполненных заданий
        const completedTaskIds = completedTasks.map(t => t.id);
        
        // Флаг, были ли изменения
        let changed = false;
        
        // Проходим по сообщениям и удаляем те, которые относятся к выполненным заданиям
        for (let i = 0; i < messages.length; i++) {
            const msg = messages[i];
            if (msg.user_id === BOT_ID && msg.message && msg.message.includes('[TASK:')) {
                // Извлекаем ID задания из сообщения
                const match = msg.message.match(/\[TASK:([^\]]+)\]/);
                if (match && completedTaskIds.includes(match[1])) {
                    messages.splice(i, 1);
                    changed = true;
                    i--; // Корректируем индекс после удаления
                }
            }
        }
        
        if (changed) {
            renderMessages();
        }
    } catch (error) {
        console.error('Ошибка при удалении сообщений о выполненных заданиях:', error);
    }
}
        async function loadMessages() { if(!currentUser?.familyId) return; try { let url=`${API_URL}/chat?`; if(currentChat.type==='private') url+=`type=private&withUserId=${currentChat.userId}`; else url+='type=family'; const r=await fetch(url,{ headers:{'Authorization':`Bearer ${token}`} }); if(r.ok){ messages=await r.json(); await removeCompletedTaskMessages(); renderMessages(); } } catch(e){} }
        
        async function loadUsers() { 
            if(!currentUser?.familyId) return; 
            try { 
                const r=await fetch(`${API_URL}/families/${currentUser.familyId}/members`,{ headers:{'Authorization':`Bearer ${token}`} }); 
                users=r.ok?await r.json():[]; 
                users.push({ id:BOT_ID, name:'🤖 Бот-помощник', avatar:'🤖', role:'bot' }); 
                const c=document.getElementById('users-list'); 
                if(!c) return; 
                c.innerHTML=`<div class="user-item" data-chat-id="family" onclick="window.switchToFamilyChat()"><div class="user-item-avatar">👨‍👩‍👧</div><div class="user-item-info"><div class="user-item-name">Семейный чат</div></div></div>`; 
                c.querySelector('.user-item').ontouchend=(e)=>{ e.preventDefault(); window.switchToFamilyChat(); };
                users.filter(u=>u.id!==currentUser?.id).forEach(u=>{ 
                    const d=document.createElement('div'); 
                    d.className='user-item'; 
                    d.dataset.chatId=u.id; 
                    d.innerHTML=`<div class="user-item-avatar">${u.id===BOT_ID?'🤖':getAvatarHtml(u.avatar,u.name)}</div><div class="user-item-info"><div class="user-item-name">${escapeHtml(u.name)}</div></div>`; 
                    d.onclick=()=>window.switchToPrivateChat(u); 
                    d.ontouchend=(e)=>{ e.preventDefault(); window.switchToPrivateChat(u); };
                    c.appendChild(d); 
                }); 
                updateUnreadIndicators(); 
            } catch(e){} 
        }
        
        // ========== ФУНКЦИИ САЙДБАРА ==========
        function openSidebar() {
            const sidebar = document.getElementById('chat-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (!sidebar) return;
            sidebar.style.left = '0px';
            sidebar.classList.add('open');
            if (overlay) overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            const sidebar = document.getElementById('chat-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (!sidebar) return;
            sidebar.style.left = '-280px';
            sidebar.classList.remove('open');
            if (overlay) overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function setSidebarCollapsed(collapsed) {
            const sidebar = document.getElementById('chat-sidebar');
            const collapseBtn = document.getElementById('sidebar-collapse-btn');
            if (!sidebar || !collapseBtn) return;
            sidebarCollapsed = collapsed;
            if (collapsed) {
                sidebar.classList.add('collapsed');
                collapseBtn.textContent = '▶';
                collapseBtn.title = 'Развернуть панель';
            } else {
                sidebar.classList.remove('collapsed');
                collapseBtn.textContent = '☰';
                collapseBtn.title = 'Свернуть панель';
            }
            if (window.innerWidth > 768) {
                localStorage.setItem('homespace_sidebar_collapsed', collapsed ? 'true' : 'false');
            }
        }


        function closeSidebarOnMobile() {
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        }

        function toggleSidebar() {
            if (window.innerWidth <= 768) {
                const sidebar = document.getElementById('chat-sidebar');
                if (sidebar.classList.contains('open')) {
                    closeSidebar();
                } else {
                    openSidebar();
                }
            }
        }
        
        window.switchToFamilyChat = function() { 
            currentChat={ type:'family', userId:null, userName:null }; 
            document.getElementById('chat-title-text').textContent='Семейный чат'; 
            messages=[]; 
            loadMessages(); 
            markAsRead('family'); 
            closeSidebarOnMobile(); 
        };
        
window.switchToPrivateChat = function(user) { 
    currentChat = { type: 'private', userId: user.id, userName: user.name }; 
    document.getElementById('chat-title-text').textContent = `Чат с ${user.name}`; 
    messages = []; 
    
    // Сначала загружаем сообщения из БД
    loadMessages().then(() => {
        // ПОСЛЕ загрузки добавляем приветствие бота
        if (user.id === BOT_ID) {
            const hasWelcome = messages.some(m => m.user_id === BOT_ID && m.message && m.message.includes('Привет!'));
            if (!hasWelcome) {
                const welcomeMsg = {
                    id: 'bot_welcome_' + Date.now(),
                    user_id: BOT_ID,
                    user_name: '🤖 Бот-помощник',
                    message: '👋 Привет! Я бот-помощник. Вот что я умею:',
                    type: 'bot',
                    created_at: new Date().toISOString(),
                    buttons: [
                        { text: '📊 Статистика', action: 'stats_personal' },
                        { text: '💰 Баланс', action: 'balance' },
                        { text: '👨‍👩‍👧 Семья', action: 'stats_family' }
                    ]
                };
                messages.unshift(welcomeMsg); // Добавляем В НАЧАЛО
                renderMessages();
            }
        }
    });
    
    markAsRead(user.id); 
    closeSidebarOnMobile(); 
};
        
        async function init() {
            await loadCurrentUser(); 
            if(!token||!currentUser){ window.location.href='/'; return; }
            
            initAudioContext();
            await syncUserData();
            
            // Простая кнопка для открытия
            const simpleBtn = document.getElementById('simple-open-btn');
            if (simpleBtn) {
                simpleBtn.onclick = function(e) {
                    e.preventDefault();
                    if (document.getElementById('chat-sidebar').classList.contains('open')) {
                        closeSidebar();
                    } else {
                        openSidebar();
                    }
                    return false;
                };
            }
            
            isSoloMode = !currentUser.familyId;
            if(isSoloMode){ 
                document.querySelector('.sidebar-header-content h2').textContent='Чат с ботом'; 
                document.querySelector('.sidebar-header-content p').textContent='Вы без семьи — доступен только бот'; 
                document.getElementById('voice-record-btn').style.display='none';
                
                // 👇 ДОБАВЬ ЭТО для soloMode:
                users = [{ id: BOT_ID, name: '🤖 Бот-помощник', avatar: '🤖', role: 'bot' }];
                const c = document.getElementById('users-list');
                if(c) {
                    c.innerHTML = '';
                    users.forEach(u => {
                        const d = document.createElement('div');
                        d.className = 'user-item';
                        d.dataset.chatId = u.id;
                        d.innerHTML = `<div class="user-item-avatar">🤖</div><div class="user-item-info"><div class="user-item-name">${escapeHtml(u.name)}</div></div>`;
                        d.onclick = () => window.switchToPrivateChat(u);
                        c.appendChild(d);
                    });
                }
            }
            
            try{ const saved=localStorage.getItem(`homespace_unread_${currentUser.id}`); if(saved) unreadCounts=JSON.parse(saved); }catch(e){ unreadCounts={}; }
            if(!isSoloMode) connectSocket(); 
            await loadUsers(); 
            await loadMessages();
            
            document.getElementById('send-btn').onclick=sendMessage;
            document.getElementById('send-btn').ontouchend=(e)=>{ e.preventDefault(); sendMessage(); };
            document.getElementById('refresh-btn').onclick=()=>loadMessages();
            document.getElementById('refresh-btn').ontouchend=(e)=>{ e.preventDefault(); loadMessages(); };
            document.getElementById('stop-audio-btn').onclick=stopAllAudio;
            
            const voiceBtn=document.getElementById('voice-record-btn');
            voiceBtn.onmousedown=startVoiceRecording; 
            voiceBtn.onmouseup=stopVoiceRecording; 
            voiceBtn.onmouseleave=stopVoiceRecording;
            voiceBtn.ontouchstart=e=>{ e.preventDefault(); startVoiceRecording(); };
            voiceBtn.ontouchend=e=>{ e.preventDefault(); stopVoiceRecording(); };
            
            document.getElementById('message-input').addEventListener('keypress',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } });
            
            const notifBtn=document.getElementById('enable-notifications-btn');
            if(Notification.permission==='granted'){ notificationPermission=true; notifBtn.classList.add('active'); }
            const notifHandler = async()=>{ if(Notification.permission==='granted'){ notificationPermission=true; notifBtn.classList.add('active'); } else if(Notification.permission!=='denied'){ const p=await Notification.requestPermission(); notificationPermission=p==='granted'; if(notificationPermission) notifBtn.classList.add('active'); } };
            notifBtn.onclick=notifHandler;
            notifBtn.ontouchend=(e)=>{ e.preventDefault(); notifHandler(); };
            
            // ========== САЙДБАР: ОТКРЫТИЕ/ЗАКРЫТИЕ ==========
            const collapseBtn = document.getElementById('sidebar-collapse-btn');
            const closeBtnMobile = document.getElementById('mobile-close-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if(collapseBtn) {
                collapseBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (window.innerWidth <= 768) return;
                    setSidebarCollapsed(!sidebarCollapsed);
                };
            }
            
            if(closeBtnMobile) {
                closeBtnMobile.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    closeSidebar();
                };
            }
            
            if(overlay) {
                overlay.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    closeSidebar();
                };
            }
            
            // Закрытие по ESC
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && window.innerWidth <= 768) {
                    closeSidebar();
                }
            });
            
            // При изменении размера окна
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) {
                    closeSidebar();
                }
                if (window.innerWidth <= 768) {
                    document.getElementById('chat-sidebar')?.classList.remove('collapsed');
                }
            });
            
            // Периодическая синхронизация
            setInterval(syncUserData, 30000);
            
            if(window.innerWidth <= 768) {
                closeSidebar();
            } else {
                const savedSidebarCollapsed = localStorage.getItem('homespace_sidebar_collapsed') === 'true';
                setSidebarCollapsed(savedSidebarCollapsed);
                window.switchToFamilyChat();
            }
            
            if(isSoloMode && users.length > 0) {
                setTimeout(() => {
                    const botUser = users.find(u => u.id === BOT_ID);
                    if(botUser && currentChat.type !== 'private') {
                        window.switchToPrivateChat(botUser);
                    }
                }, 1000);
            }
            
            // ========== СВАЙП ДЛЯ ЗАКРЫТИЯ (ТОЛЬКО ЭТОТ БЛОК) ==========
            const swipeSidebar = document.getElementById('chat-sidebar');
            let touchStartX = 0;
            
            if (swipeSidebar) {
                swipeSidebar.addEventListener('touchstart', function(e) {
                    touchStartX = e.touches[0].clientX;
                });
                
                swipeSidebar.addEventListener('touchmove', function(e) {
                    const touchEndX = e.touches[0].clientX;
                    const deltaX = touchEndX - touchStartX;
                    if (deltaX < -30 && swipeSidebar.classList.contains('open')) {
                        e.preventDefault();
                        closeSidebar(); // Эта функция убирает и оверлей, и открывает чат
                    }
                });
            }
        }
        init();
        
        window.debugSidebar = {
            open: () => openSidebar(),
            close: () => closeSidebar(),
            toggle: () => toggleSidebar(),
            state: () => document.getElementById('chat-sidebar')?.classList.contains('open')
        };
    </script>
