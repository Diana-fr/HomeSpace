<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="/config.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HomeSpace - Семейный чат</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #dfefff 0%, #d4e9ff 40%, #eaf4ff 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
            color: #33465d;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(120, 180, 255, 0.18), transparent 55%);
            animation: pulse 10s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(180, 220, 255, 0.18), transparent 55%);
            animation: pulse 14s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.25; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.08); }
        }

        /* Кнопка "Назад" */
        .back-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(140, 190, 255, 0.35);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            border-radius: 40px;
            padding: 10px 20px;
            color: #33465d;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .back-btn:hover { background: rgba(235,245,255,0.85); transform: translateX(-3px); }

        .chat-app { display: flex; height: 100vh; position: relative; z-index: 10; }

        /* ========= САЙДБАР С ВОЗМОЖНОСТЬЮ СВОРАЧИВАНИЯ (мобильная версия) ========= */
        .chat-sidebar {
            width: 280px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(140, 190, 255, 0.3);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 200;
            box-shadow: 4px 0 20px rgba(0,0,0,0.05);
        }

        /* Десктоп: панель всегда открыта */
        @media (min-width: 769px) {
            .chat-sidebar { transform: translateX(0) !important; }
            .sidebar-toggle-mobile { display: none; }
        }

        /* Мобильные стили: панель по умолчанию скрыта, открывается по кнопке */
        @media (max-width: 768px) {
            .chat-sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: 280px;
                z-index: 1000;
                box-shadow: 4px 0 25px rgba(0,0,0,0.2);
            }
            .chat-sidebar.open {
                transform: translateX(0);
            }
            /* Оверлей при открытой панели */
            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.2);
                backdrop-filter: blur(3px);
                z-index: 999;
                display: none;
                transition: opacity 0.2s;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }

        .sidebar-header {
            padding: 60px 20px 20px 20px;
            border-bottom: 1px solid rgba(140, 190, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h2 { color: #33465d; font-size: 20px; font-weight: 700; }
        .sidebar-header p { color: rgba(51,70,93,0.6); font-size: 12px; margin-top: 5px; }
        .sidebar-close-mobile {
            background: rgba(140,190,255,0.2);
            border: none;
            border-radius: 30px;
            width: 32px;
            height: 32px;
            font-size: 18px;
            cursor: pointer;
            color: #33465d;
            display: none;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 768px) {
            .sidebar-close-mobile { display: flex; }
        }

        .user-info {
            padding: 20px;
            background: linear-gradient(135deg, rgba(180,220,255,0.25), rgba(140,190,255,0.15));
            border-bottom: 1px solid rgba(140,190,255,0.25);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #a8d8ff, #ffffff);
            box-shadow: 0 4px 12px rgba(120,180,255,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }
        .user-details { flex: 1; }
        .user-name { color: #33465d; font-weight: 600; font-size: 16px; }
        .user-role { color: rgba(51,70,93,0.6); font-size: 12px; }

        .users-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: all 0.2s ease;
        }
        .user-item:hover {
            background: rgba(140,190,255,0.18);
            transform: translateX(3px);
        }
        .user-item.active {
            background: linear-gradient(135deg, rgba(140,190,255,0.3), rgba(180,220,255,0.25));
            border-left: 3px solid #6fbaff;
        }
        .user-item.has-unread {
            background: rgba(140,190,255,0.2);
            animation: unreadBlink 1.1s ease-in-out infinite;
        }
        @keyframes unreadBlink { 0%,100% { box-shadow: 0 0 0 rgba(120,180,255,0); } 50% { box-shadow: 0 0 0 3px rgba(120,180,255,0.3); } }
        .unread-badge {
            background: linear-gradient(135deg, #6fbaff, #a8d8ff);
            box-shadow: 0 0 10px rgba(120,180,255,0.6);
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            padding: 0 5px;
            margin-left: 8px;
            color: #fff;
        }
        .user-item-avatar { width: 40px; height: 40px; background: rgba(120,180,255,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden; }
        .user-item-info { flex: 1; display: flex; align-items: center; gap: 5px; }
        .user-item-name { color: #33465d; font-size: 14px; font-weight: 500; }

        /* ========= ОСНОВНАЯ ОБЛАСТЬ ЧАТА ========= */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .chat-header {
            background: rgba(255,255,255,0.6);
            border-bottom: 1px solid rgba(140,190,255,0.25);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-title { color: #33465d; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        /* Кнопка открытия сайдбара на мобилках (бургер) */
        .burger-menu {
            display: none;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(140,190,255,0.5);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 20px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            color: #33465d;
        }
        @media (max-width: 768px) {
            .burger-menu { display: flex; }
            .chat-header { padding: 12px 16px; padding-top: 56px; }
        }
        .header-actions { display: flex; gap: 10px; }
        .notification-btn, .refresh-btn {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(140,190,255,0.35);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .notification-btn.active { background: rgba(120,180,255,0.35); color: #2c5a8c; }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message { display: flex; gap: 12px; max-width: 70%; animation: fadeInUp 0.3s ease; }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #dbeeff, #ffffff); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; overflow: hidden; }
        .message-content-wrapper { display: flex; flex-direction: column; gap: 4px; max-width: calc(100% - 48px); }
        .message-content { background: rgba(255,255,255,0.75); border: 1px solid rgba(140,190,255,0.25); backdrop-filter: blur(8px); padding: 10px 14px; border-radius: 18px; }
        .message.own .message-content { background: linear-gradient(135deg, #cfe6ff, #e6f3ff); box-shadow: 0 6px 14px rgba(120,180,255,0.3); }
        .message.bot .message-content { background: linear-gradient(135deg, #e8f3ff, #d6ebff); border-left: 3px solid #6fbaff; }
        .message-sender { font-size: 12px; font-weight: 600; color: #4a6a8a; margin-bottom: 4px; }
        .message-text { font-size: 14px; color: #2f3f55; line-height: 1.5; word-break: break-word; }
        .message-time { font-size: 10px; color: rgba(51,70,93,0.6); margin-top: 4px; text-align: right; }
        .bot-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .bot-btn { background: rgba(255,255,255,0.8); border: 1px solid rgba(120,180,255,0.5); border-radius: 20px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
        .voice-message { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 8px 12px; background: rgba(120,180,255,0.15); border-radius: 20px; }
        .voice-play-btn { background: linear-gradient(135deg, #6fbaff, #a8d8ff); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; color: white; }
        .speed-controls { display: inline-flex; gap: 6px; margin-left: 8px; }
        .speed-btn { background: rgba(255,255,255,0.6); border: 1px solid rgba(120,180,255,0.5); border-radius: 14px; padding: 3px 8px; font-size: 10px; cursor: pointer; }
        .speed-btn.active { background: linear-gradient(135deg, #6fbaff, #a8d8ff); color: white; }

        .chat-input-area {
            padding: 15px 20px;
            background: rgba(255,255,255,0.6);
            border-top: 1px solid rgba(140,190,255,0.25);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .chat-input { flex: 1; background: rgba(255,255,255,0.85); border: 1px solid rgba(140,190,255,0.35); border-radius: 24px; padding: 12px 18px; resize: none; outline: none; font-family: inherit; }
        .send-btn, .voice-btn { background: linear-gradient(135deg, #ffffff, #eaf4ff); border: 1px solid rgba(120,180,255,0.5); border-radius: 50%; width: 48px; height: 48px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .send-btn { background: linear-gradient(135deg, #6fbaff, #a8d8ff); color: white; }
        .voice-btn.recording { animation: pulseRecord 1s infinite; background: #d8ecff; }
        @keyframes pulseRecord { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

        #stop-audio-btn {
            position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, #6fbaff, #a8d8ff); border: 2px solid white; color: white; font-size: 24px;
            display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 10000;
        }
        .empty-messages { text-align: center; padding: 60px 20px; color: rgba(79, 105, 136, 0.62); }
        @media (max-width: 768px) { .message { max-width: 85%; } .chat-input { font-size: 14px; } .send-btn, .voice-btn { width: 42px; height: 42px; } }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='/'">← Назад в меню</button>
    <div id="stop-audio-btn" onclick="stopAllAudio()">⏹️</div>

    <div class="chat-app">
        <!-- Оверлей для мобильного закрытия боковой панели -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Боковая панель с пользователями -->
        <div class="chat-sidebar" id="chat-sidebar">
            <div class="sidebar-header">
                <div>
                    <h2>Семейный чат</h2>
                    <p>Общайтесь всей семьёй</p>
                </div>
                <button class="sidebar-close-mobile" id="close-sidebar-mobile">✕</button>
            </div>
            <div class="user-info" id="user-info">
                <div class="user-avatar" id="user-avatar"></div>
                <div class="user-details">
                    <div class="user-name" id="user-name">Загрузка...</div>
                    <div class="user-role" id="user-role"></div>
                </div>
            </div>
            <div class="users-list" id="users-list"><div style="padding:20px; text-align:center;">Загрузка...</div></div>
        </div>

        <!-- Основной чат -->
        <div class="chat-main">
            <div class="chat-header">
                <div class="chat-title">
                    <button class="burger-menu" id="burger-menu-btn">☰</button>
                    <span id="chat-title-text">Семейный чат</span>
                </div>
                <div class="header-actions">
                    <button class="notification-btn" id="enable-notifications-btn" title="Уведомления">🔔</button>
                    <button class="refresh-btn" id="refresh-btn" title="Обновить">⟳</button>
                </div>
            </div>
            <div class="messages-area" id="messages-area"><div class="empty-messages"><div>💬</div><div>Выберите чат</div></div></div>
            <div class="chat-input-area">
                <textarea class="chat-input" id="message-input" placeholder="Введите сообщение..." rows="1"></textarea>
                <button class="voice-btn" id="voice-record-btn" title="Записать голосовое">🎤</button>
                <button class="send-btn" id="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.API_URL;
        const BOT_ID = '00000000-0000-0000-0000-000000000001';
        let token = localStorage.getItem('homespace_token');
        let currentUser = null;
        let currentChat = { type: 'family', userId: null, userName: null };
        let messages = [], users = [], socket = null;
        let unreadCounts = {};
        let notificationPermission = false;
        let speechSynthesis = window.speechSynthesis;
        let currentUtterance = null, currentAudio = null;
        let mediaRecorder = null, audioChunks = [], isRecording = false;
        let currentSpeed = parseFloat(localStorage.getItem('voice_speed') || '1.0');
        let isSoloMode = false;

        // ========== Утилиты ==========
        function escapeHtml(text) { if(!text) return ''; const d=document.createElement('div'); d.textContent=text; return d.innerHTML; }
        function formatMessageDate(date) { const d=new Date(date), today=new Date(); return d.toDateString()===today.toDateString() ? 'Сегодня' : d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'}); }
        function getAvatarHtml(avatar, name) {
            if(avatar && (avatar.startsWith('http') || avatar.includes('/uploads/'))) return `<img class="avatar-image" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" src="${escapeHtml(avatar)}" alt="">`;
            const parts = (name || 'П').trim().split(/\s+/).slice(0,2);
            const initials = parts.map(p=>p[0]?.toUpperCase()||'').join('') || 'U';
            return `<span style="font-size:14px;font-weight:700;">${initials}</span>`;
        }
        function stopAllAudio() { if(currentAudio){ currentAudio.pause(); currentAudio.currentTime=0; currentAudio=null; } if(currentUtterance){ speechSynthesis.cancel(); currentUtterance=null; } document.getElementById('stop-audio-btn').style.display='none'; }
        function speakText(text, btn) { if(!text) return; stopAllAudio(); const utterance=new SpeechSynthesisUtterance(text); utterance.lang='ru-RU'; utterance.rate=1.0; currentUtterance=utterance; if(btn) btn.textContent='⏸️'; document.getElementById('stop-audio-btn').style.display='flex'; utterance.onend=()=>{ if(btn) btn.textContent='🔊'; currentUtterance=null; document.getElementById('stop-audio-btn').style.display='none'; }; speechSynthesis.speak(utterance); }
        function setSpeed(speed) { currentSpeed=speed; if(currentAudio) currentAudio.playbackRate=speed; localStorage.setItem('voice_speed',speed); document.querySelectorAll('.speed-btn').forEach(btn=>{ btn.classList.remove('active'); if(btn.dataset.speed===String(speed)) btn.classList.add('active'); }); }
        function playVoiceMessage(url) { stopAllAudio(); currentAudio=new Audio(window.BASE_URL+url); currentAudio.playbackRate=currentSpeed; currentAudio.play(); document.getElementById('stop-audio-btn').style.display='flex'; currentAudio.onended=()=>{ document.getElementById('stop-audio-btn').style.display='none'; currentAudio=null; }; }

        async function loadCurrentUser() { const saved=localStorage.getItem('homespace_currentUser'); if(saved){ currentUser=JSON.parse(saved); token=localStorage.getItem('homespace_token'); document.getElementById('user-name').textContent=currentUser.name||'Пользователь'; document.getElementById('user-avatar').innerHTML=getAvatarHtml(currentUser.avatar,currentUser.name); document.getElementById('user-role').textContent=currentUser.role==='parent'?'Родитель':'Ребёнок'; } }

        function renderMessages() {
            const area=document.getElementById('messages-area'); if(!area) return;
            if(!messages?.length){ area.innerHTML=`<div class="empty-messages"><div style="font-size:48px">💬</div><div>Нет сообщений</div></div>`; return; }
            area.innerHTML=''; let lastDate='';
            messages.forEach(msg=>{
                const dateLabel=formatMessageDate(msg.created_at);
                if(dateLabel!==lastDate){ const sep=document.createElement('div'); sep.style.cssText='text-align:center;font-size:12px;color:rgba(51,70,93,0.6);margin:6px 0 12px'; sep.textContent=dateLabel; area.appendChild(sep); lastDate=dateLabel; }
                const isOwn=msg.user_id===currentUser?.id, isBot=msg.user_id===BOT_ID||msg.type==='bot';
                const time=new Date(msg.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
                const cleanMsg=escapeHtml(msg.message||'');
                const displayMsg=cleanMsg.replace(/\n/g,'<br>')+(msg.is_edited&&msg.message_type!=='voice'?` <span style="font-size:10px;">(ред.)</span>`:'');
                const senderAvatar=isBot?'🤖':(isOwn?getAvatarHtml(currentUser?.avatar,currentUser?.name):getAvatarHtml(msg.user_avatar,msg.user_name));
                const msgDiv=document.createElement('div'); msgDiv.className=`message ${isOwn?'own':''} ${isBot?'bot':''}`;
                msgDiv.innerHTML=`<div class="message-avatar">${senderAvatar}</div><div class="message-content-wrapper"><div class="message-content">${!isOwn&&!isBot?`<div class="message-sender">${escapeHtml(msg.user_name)}</div>`:''}${isBot?'<div class="message-sender">🤖 Бот-помощник</div>':''}${msg.message_type!=='voice'?`<div class="message-text">${displayMsg}</div>`:''}${msg.message_type==='voice'&&msg.voice_url?`<div class="voice-message"><button class="voice-play-btn" onclick="playVoiceMessage('${msg.voice_url}')">▶️</button><span class="voice-duration">${msg.voice_duration||'Голосовое'}</span><div class="speed-controls"><button class="speed-btn ${currentSpeed===0.5?'active':''}" data-speed="0.5" onclick="setSpeed(0.5)">0.5x</button><button class="speed-btn ${currentSpeed===1.0?'active':''}" data-speed="1.0" onclick="setSpeed(1.0)">1x</button><button class="speed-btn ${currentSpeed===1.5?'active':''}" data-speed="1.5" onclick="setSpeed(1.5)">1.5x</button><button class="speed-btn ${currentSpeed===2.0?'active':''}" data-speed="2.0" onclick="setSpeed(2.0)">2x</button></div></div>`:''}${isBot&&msg.buttons?`<div class="bot-buttons">${msg.buttons.map(btn=>`<button class="bot-btn" onclick="window.botAction('${btn.action}')">${btn.text}</button>`).join('')}</div>`:''}<div class="message-time">${time}</div></div><div class="message-actions" style="display:flex;gap:8px;margin-top:5px;">${msg.message_type!=='voice'&&isOwn?`<button class="edit-msg-btn" data-id="${msg.id}" data-message="${cleanMsg.replace(/"/g,'&quot;')}" style="background:rgba(255,255,255,0.7);border:none;border-radius:12px;padding:4px 8px;">✏️</button>`:''}${msg.message_type!=='voice'&&!isBot?`<button class="speak-btn" data-message="${cleanMsg.replace(/"/g,'&quot;')}" style="background:rgba(255,255,255,0.7);border:none;border-radius:12px;padding:4px 8px;">🔊</button>`:''}${!isBot?`<button class="delete-msg-btn" data-id="${msg.id}" style="background:rgba(255,255,255,0.7);border:none;border-radius:12px;padding:4px 8px;">🗑️</button>`:''}</div></div>`;
                area.appendChild(msgDiv);
            });
            area.querySelectorAll('.edit-msg-btn').forEach(btn=>btn.onclick=async()=>{ const newMsg=prompt('Редактировать:',btn.dataset.message); if(newMsg&&newMsg.trim()) await editMessage(btn.dataset.id,newMsg.trim()); });
            area.querySelectorAll('.delete-msg-btn').forEach(btn=>btn.onclick=async()=>{ if(confirm('Удалить?')) await deleteMessage(btn.dataset.id); });
            area.querySelectorAll('.speak-btn').forEach(btn=>btn.onclick=()=>speakText(btn.dataset.message,btn));
            area.scrollTop=area.scrollHeight;
        }

        window.botAction=async function(action){
            let response='', buttons=[];
            if(action==='stats_personal'){ const s=await loadPersonalStats(); response=`📊 Твоя статистика:\n📋 Заданий: ${s.totalTasks}\n✅ Выполнено: ${s.completedTasks}\n💰 Баланс: ${s.currentBalance}`; buttons=[{text:'🔄 Обновить',action:'stats_personal'},{text:'👨‍👩‍👧 Семья',action:'stats_family'}]; }
            else if(action==='stats_family'){ const s=await loadFamilyStats(); response=`👨‍👩‍👧 Семья:\n👥 Участников: ${s.membersCount}\n📋 Заданий: ${s.totalTasks}\n✅ Выполнено: ${s.completedTasks}`; if(s.topMembers) response+=`\n\n🏆 Топ:\n${s.topMembers}`; buttons=[{text:'📊 Личная',action:'stats_personal'}]; }
            else if(action==='balance'){ response=`💰 Твой баланс: ${currentUser?.bonuses||0} бонусов`; buttons=[{text:'📊 Статистика',action:'stats_personal'}]; }
            else { response=`👋 Привет! Я бот-помощник. Напиши: баланс, статистика, семья`; buttons=[{text:'📊 Статистика',action:'stats_personal'},{text:'💰 Баланс',action:'balance'},{text:'👨‍👩‍👧 Семья',action:'stats_family'}]; }
            addBotMessage(response,buttons);
        };
        function addBotMessage(text,buttons=[]){ const msg={ id:'bot_'+Date.now(), user_id:BOT_ID, user_name:'🤖 Бот-помощник', message:text, message_type:'text', type:'bot', created_at:new Date().toISOString(), buttons }; messages.push(msg); renderMessages(); }

        async function loadPersonalStats() { try { const r=await fetch(`${API_URL}/tasks?`,{headers:{'Authorization':`Bearer ${token}`}}); const tasks=r.ok?await r.json():[]; const my=tasks.filter(t=>t.assigned_to===currentUser?.id); return { totalTasks:my.length, completedTasks:my.filter(t=>t.status==='completed').length, currentBalance:currentUser?.bonuses||0 }; } catch(e){ return { totalTasks:0, completedTasks:0, currentBalance:0 }; } }
        async function loadFamilyStats() { try { const r=await fetch(`${API_URL}/families/${currentUser.familyId}/members`,{headers:{'Authorization':`Bearer ${token}`}}); const members=r.ok?await r.json():[]; const t=await fetch(`${API_URL}/tasks?`,{headers:{'Authorization':`Bearer ${token}`}}); const tasks=t.ok?await t.json():[]; const sorted=[...members].sort((a,b)=>(b.bonuses||0)-(a.bonuses||0)).slice(0,5); const top=sorted.map((m,i)=>`${i+1}. ${m.name}: ${m.bonuses||0}💰`).join('\n'); return { membersCount:members.length, totalTasks:tasks.length, completedTasks:tasks.filter(t=>t.status==='completed').length, topMembers:top }; } catch(e){ return { membersCount:0, totalTasks:0, completedTasks:0, topMembers:'' }; } }

        async function sendMessage() { const inp=document.getElementById('message-input'); const msg=inp.value.trim(); if(!msg) return; inp.value=''; if(socket?.connected) socket.emit('send-message',{ familyId:currentUser.familyId, userId:currentUser.id, message:msg, type:currentChat.type, recipientId:currentChat.type==='private'?currentChat.userId:null }); else await fetch(`${API_URL}/chat`,{ method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({message:msg, type:currentChat.type, recipientId:currentChat.type==='private'?currentChat.userId:null}) }).then(()=>loadMessages()); if(currentChat.userId===BOT_ID) setTimeout(()=>window.botAction('help'),300); }
        async function editMessage(id,newMsg) { try { await fetch(`${API_URL}/chat/${id}`,{ method:'PATCH', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({message:newMsg}) }); loadMessages(); } catch(e){} }
        async function deleteMessage(id) { try { await fetch(`${API_URL}/chat/${id}`,{ method:'DELETE', headers:{'Authorization':`Bearer ${token}`}, body:JSON.stringify({deleteForAll:true}) }); loadMessages(); } catch(e){} }

        function markAsRead(chatId){ unreadCounts[chatId]=0; updateUnreadIndicators(); if(currentUser?.id) localStorage.setItem(`homespace_unread_${currentUser.id}`,JSON.stringify(unreadCounts)); }
        function updateUnreadIndicators() { document.querySelectorAll('.user-item').forEach(item=>{ const chatId=item.dataset.chatId; const count=unreadCounts[chatId]||0; const badge=item.querySelector('.unread-badge'); if(count>0){ item.classList.add('has-unread'); if(badge) badge.textContent=count>99?'99+':count; else{ const b=document.createElement('span'); b.className='unread-badge'; b.textContent=count; item.querySelector('.user-item-info')?.appendChild(b); } } else{ item.classList.remove('has-unread'); if(badge) badge.remove(); } }); }

        async function loadMessages() { if(!currentUser?.familyId) return; try { let url=`${API_URL}/chat?`; if(currentChat.type==='private') url+=`type=private&withUserId=${currentChat.userId}`; else url+='type=family'; const r=await fetch(url,{ headers:{'Authorization':`Bearer ${token}`} }); if(r.ok){ messages=await r.json(); renderMessages(); } } catch(e){} }

        function connectSocket() { if(!currentUser?.familyId) return; socket=io(window.WS_URL,{ withCredentials:true }); socket.on('connect',()=>socket.emit('join-family',{ familyId:currentUser.familyId, userId:currentUser.id, userName:currentUser.name, userAvatar:currentUser.avatar, token })); socket.on('new-message',msg=>{ const chatId=msg.type==='family'?'family':(msg.user_id===currentUser.id?msg.recipient_id:msg.user_id); const isRelevant=(currentChat.type==='family'&&(msg.type==='family'||msg.type==='bot'))||(currentChat.type==='private'&&((msg.user_id===currentUser.id&&msg.recipient_id===currentChat.userId)||(msg.user_id===currentChat.userId&&msg.recipient_id===currentUser.id))); if(isRelevant){ messages.push(msg); renderMessages(); } else if(msg.user_id!==currentUser.id){ unreadCounts[chatId]=(unreadCounts[chatId]||0)+1; updateUnreadIndicators(); if(document.hidden&&Notification.permission==='granted') new Notification('💬 Новое сообщение',{ body:msg.message }); } }); }

        async function loadUsers() { if(!currentUser?.familyId) return; try { const r=await fetch(`${API_URL}/families/${currentUser.familyId}/members`,{ headers:{'Authorization':`Bearer ${token}`} }); users=r.ok?await r.json():[]; users.push({ id:BOT_ID, name:'🤖 Бот-помощник', avatar:'🤖', role:'bot' }); const c=document.getElementById('users-list'); if(!c) return; c.innerHTML=`<div class="user-item" data-chat-id="family" onclick="window.switchToFamilyChat()"><div class="user-item-avatar">👨‍👩‍👧</div><div class="user-item-info"><div class="user-item-name">Семейный чат</div></div></div>`; users.filter(u=>u.id!==currentUser?.id).forEach(u=>{ const d=document.createElement('div'); d.className='user-item'; d.dataset.chatId=u.id; d.innerHTML=`<div class="user-item-avatar">${u.id===BOT_ID?'🤖':getAvatarHtml(u.avatar,u.name)}</div><div class="user-item-info"><div class="user-item-name">${escapeHtml(u.name)}</div></div>`; d.onclick=()=>window.switchToPrivateChat(u); c.appendChild(d); }); updateUnreadIndicators(); } catch(e){} }

        window.switchToFamilyChat = function() { currentChat={ type:'family', userId:null, userName:null }; document.getElementById('chat-title-text').textContent='Семейный чат'; loadMessages(); markAsRead('family'); closeSidebarOnMobile(); };
        window.switchToPrivateChat = function(user) { currentChat={ type:'private', userId:user.id, userName:user.name }; document.getElementById('chat-title-text').textContent=`Чат с ${user.name}`; loadMessages(); markAsRead(user.id); if(user.id===BOT_ID) setTimeout(()=>window.botAction('help'),300); closeSidebarOnMobile(); };

        function openSidebar() { document.getElementById('chat-sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('active'); }
        function closeSidebarOnMobile() { if(window.innerWidth<=768){ document.getElementById('chat-sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('active'); } }

        async function startVoiceRecording() { try { const stream=await navigator.mediaDevices.getUserMedia({ audio:true }); mediaRecorder=new MediaRecorder(stream); audioChunks=[]; mediaRecorder.ondataavailable=e=>audioChunks.push(e.data); mediaRecorder.onstop=async()=>{ const blob=new Blob(audioChunks,{type:'audio/webm'}); const fd=new FormData(); fd.append('audio',blob,'voice.webm'); fd.append('type',currentChat.type); if(currentChat.type==='private') fd.append('recipientId',currentChat.userId); try{ await fetch(`${API_URL}/chat/voice`,{ method:'POST', headers:{'Authorization':`Bearer ${token}`}, body:fd }); loadMessages(); }catch(e){} stream.getTracks().forEach(t=>t.stop()); }; mediaRecorder.start(); isRecording=true; document.getElementById('voice-record-btn').classList.add('recording'); } catch(e){ alert('Нет доступа к микрофону'); } }
        function stopVoiceRecording() { if(mediaRecorder&&isRecording){ mediaRecorder.stop(); isRecording=false; document.getElementById('voice-record-btn').classList.remove('recording'); } }

        async function init() {
            await loadCurrentUser(); if(!token||!currentUser){ window.location.href='/'; return; }
            isSoloMode=!currentUser.familyId; if(isSoloMode) document.querySelector('.sidebar-header p').textContent='Вы без семьи — доступен только бот';
            try{ const saved=localStorage.getItem(`homespace_unread_${currentUser.id}`); if(saved) unreadCounts=JSON.parse(saved); }catch(e){ unreadCounts={}; }
            if(!isSoloMode) connectSocket(); await loadUsers(); await loadMessages();
            document.getElementById('send-btn').onclick=sendMessage;
            document.getElementById('refresh-btn').onclick=loadMessages;
            document.getElementById('stop-audio-btn').onclick=stopAllAudio;
            const voiceBtn=document.getElementById('voice-record-btn'); voiceBtn.onmousedown=startVoiceRecording; voiceBtn.onmouseup=stopVoiceRecording; voiceBtn.onmouseleave=stopVoiceRecording;
            voiceBtn.ontouchstart=e=>{ e.preventDefault(); startVoiceRecording(); }; voiceBtn.ontouchend=e=>{ e.preventDefault(); stopVoiceRecording(); };
            document.getElementById('message-input').addEventListener('keypress',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } });
            document.getElementById('enable-notifications-btn').onclick=async()=>{ if(Notification.permission==='granted'){ notificationPermission=true; } else if(Notification.permission!=='denied'){ const p=await Notification.requestPermission(); notificationPermission=p==='granted'; } };
            // Мобильное управление панелью
            document.getElementById('burger-menu-btn').addEventListener('click', openSidebar);
            document.getElementById('close-sidebar-mobile').addEventListener('click', closeSidebarOnMobile);
            document.getElementById('sidebar-overlay').addEventListener('click', closeSidebarOnMobile);
            window.switchToFamilyChat();
        }
                // ФИКС ДЛЯ БОТА - ДОЛЖЕН БЫТЬ ДО init()
        const originalSwitch = window.switchToPrivateChat;
        window.switchToPrivateChat = function(user) {
            if (originalSwitch) originalSwitch(user);
            if (user.id === BOT_ID) {
                setTimeout(() => {
                    const hasBotMsgs = messages.some(m => m.user_id === BOT_ID);
                    if (!hasBotMsgs) {
                        messages.push({
                            id: 'bot_welcome_' + Date.now(),
                            user_id: BOT_ID,
                            user_name: '🤖 Бот-помощник',
                            message: '👋 Привет! Я бот-помощник. Вот что я умею:',
                            type: 'bot',
                            created_at: new Date().toISOString(),
                            buttons: [
                                { text: '📊 Статистика', action: 'stats_personal' },
                                { text: '💰 Баланс', action: 'balance' },
                                { text: '👨‍👩‍👧 Семья', action: 'stats_family' }
                            ]
                        });
                        renderMessages();
                    }
                }, 200);
            }
        };
        
        // Автоматически открываем чат с ботом, если пользователь без семьи
        if (currentUser && !currentUser.familyId) {
            setTimeout(() => {
                const botUser = users.find(u => u.id === BOT_ID);
                if (botUser && currentChat.type !== 'private') {
                    window.switchToPrivateChat(botUser);
                }
            }, 500);
        }
        init();
    </script>
</body>
</html>
