<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="/config.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HomeSpace - Магазин желаний</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #dcecff 0%, #d3e7ff 100%);
            min-height: 100vh;
            position: relative;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(137, 207, 240, 0.24) 0%, transparent 55%);
            animation: pulse 8s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(168, 216, 255, 0.2) 0%, transparent 55%);
            animation: pulse 12s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Кнопка назад */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(244, 250, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(137, 207, 240, 0.6);
            border-radius: 40px;
            padding: 10px 20px;
            color: #33465d;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(168, 216, 255, 0.3);
            border-color: #72bde8;
            transform: translateX(-3px);
        }

        /* Заголовок */
        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #4f6988, #33465d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 8px;
        }

        .header p {
            color: rgba(51, 70, 93, 0.8);
            margin-top: 10px;
        }

        /* Панель бонусов */
        .bonus-panel {
            background: linear-gradient(135deg, rgba(211,231,255,0.8), rgba(168,216,255,0.35));
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(137, 207, 240, 0.6);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #a8d8ff, #89cff0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 4px 15px rgba(114, 189, 232, 0.3);
        }

        .user-details h3 {
            color: #33465d;
            font-size: 18px;
        }

        .user-details p {
            color: rgba(51, 70, 93, 0.7);
            font-size: 12px;
            margin-top: 4px;
        }

        .bonus-card {
            background: rgba(211, 231, 255, 0.8);
            border-radius: 20px;
            padding: 10px 25px;
            text-align: center;
            border: 1px solid #72bde8;
        }

        .bonus-label {
            font-size: 12px;
            color: rgba(51, 70, 93, 0.7);
        }

        .bonus-value {
            font-size: 36px;
            font-weight: 800;
            color: #33465d;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: rgba(230, 242, 255, 0.95);
            border: 1px solid rgba(137, 207, 240, 0.55);
            padding: 12px 30px;
            border-radius: 40px;
            color: #33465d;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: 500;
        }

        .tab-btn:hover {
            border-color: rgba(114, 189, 232, 0.9);
            background: rgba(168, 216, 255, 0.3);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: rgba(168, 216, 255, 0.45);
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(114,189,232,0.35);
        }

        /* Кнопка создания (уже не нужна, т.к. отдельная вкладка) */
        .create-wish-btn {
            background: linear-gradient(135deg, #a8d8ff, #89cff0);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            color: #33465d;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        /* Список желаний */
        .wishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .wish-card {
            background: rgba(226, 240, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 2px solid transparent;
            background-clip: padding-box;
            background-image: linear-gradient(rgba(226, 240, 255, 0.95), rgba(226, 240, 255, 0.95)), linear-gradient(135deg, #89cff0, #72bde8);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(51,70,93,0.18);
        }

        .wish-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(137,207,240,0.24), transparent);
            pointer-events: none;
            border-radius: 22px;
        }

        .wish-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: transparent;
            box-shadow: 0 12px 40px rgba(114,189,232,0.35), 0 0 30px rgba(137,207,240,0.25);
        }

        .wish-card.pending {
            border-left: 4px solid #72bde8;
        }

        .wish-card.purchased {
            opacity: 0.7;
            border-left: 4px solid #89cff0;
        }

        .wish-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .wish-title {
            font-size: 20px;
            font-weight: 700;
            color: #33465d;
            margin-bottom: 8px;
        }

        .wish-description {
            font-size: 13px;
            color: rgba(51, 70, 93, 0.72);
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .wish-image img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        .wish-link { margin: 8px 0; }
        .wish-link a { color: #3f5874; text-decoration: none; }
        .wish-comments { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(137,207,240,0.35); }
        .comment-row { font-size: 12px; color: #33465d; margin-bottom: 6px; }

        .wish-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .wish-price {
            background: rgba(168, 216, 255, 0.36);
            padding: 5px 12px;
            border-radius: 20px;
            color: #33465d;
            font-weight: 700;
            font-size: 18px;
        }

        .wish-creator {
            font-size: 11px;
            color: rgba(51, 70, 93, 0.62);
        }

        .wish-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(211, 231, 255, 0.8);
        }

        .wish-status.approved {
            background: rgba(168, 216, 255, 0.35);
            color: #33465d;
        }

        .wish-status.pending {
            background: rgba(201, 228, 255, 0.5);
            color: #33465d;
        }

        .wish-status.purchased {
            background: rgba(168, 216, 255, 0.3);
            color: #33465d;
        }

        .wish-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .buy-btn {
            flex: 1;
            background: linear-gradient(135deg, #a8d8ff, #89cff0);
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: #33465d;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(114,189,232,0.3);
        }

        .buy-btn:hover:not(.disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(114,189,232,0.45);
            background: linear-gradient(135deg, #b8defd, #89cff0);
        }

        .approve-btn {
            background: rgba(168, 216, 255, 0.3);
            border: 1px solid #72bde8;
            padding: 8px 15px;
            border-radius: 30px;
            color: #33465d;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .approve-btn:hover {
            background: rgba(168, 216, 255, 0.4);
            box-shadow: 0 4px 12px rgba(114,189,232,0.3);
            transform: translateY(-1px);
        }

        .reject-btn {
            background: rgba(201, 228, 255, 0.6);
            border: 1px solid #72bde8;
            padding: 8px 15px;
            border-radius: 30px;
            color: #33465d;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reject-btn:hover {
            background: rgba(168, 216, 255, 0.45);
            box-shadow: 0 4px 12px rgba(114,189,232,0.3);
            transform: translateY(-1px);
        }

        .price-input {
            background: rgba(248, 252, 255, 0.95);
            border: 1px solid #72bde8;
            border-radius: 30px;
            padding: 8px 12px;
            color: #33465d;
            width: 80px;
            text-align: center;
        }

        /* Модальное окно одобрения */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(49, 67, 89, 0.35);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(226, 240, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(137, 207, 240, 0.6);
        }

        .modal-content h3 {
            color: #33465d;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            background: rgba(248, 252, 255, 0.95);
            border: 1px solid rgba(137, 207, 240, 0.55);
            border-radius: 12px;
            color: #33465d;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .modal-content textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-save {
            background: #89cff0;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            color: #33465d;
            cursor: pointer;
        }

        .modal-cancel {
            background: rgba(201, 228, 255, 0.6);
            border: 1px solid #72bde8;
            padding: 10px 25px;
            border-radius: 30px;
            color: #33465d;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(226, 240, 255, 0.88);
            border-radius: 20px;
            color: rgba(51, 70, 93, 0.72);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        /* СВЕТЛАЯ СТИЛИЗАЦИЯ ФОРМЫ СОЗДАНИЯ ЖЕЛАНИЯ (обновлено в стиле основного интерфейса) */
        .create-wish-card {
            background: rgba(226, 240, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 36px 32px;
            border: 1px solid rgba(137, 207, 240, 0.6);
            box-shadow: 0 20px 35px rgba(51,70,93,0.12);
            transition: all 0.2s;
        }
        .create-wish-card .form-group {
            margin-bottom: 24px;
        }
        .create-wish-card label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #33465d;
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }
        .create-wish-card input, 
        .create-wish-card textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(248, 252, 255, 0.95);
            border: 1px solid rgba(114, 189, 232, 0.5);
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: #1f2c3c;
            transition: all 0.2s;
        }
        .create-wish-card input:focus, 
        .create-wish-card textarea:focus {
            outline: none;
            border-color: #72bde8;
            box-shadow: 0 0 0 3px rgba(114,189,232,0.2);
        }
        .image-preview-area {
            width: 100%;
            height: 180px;
            background: rgba(200, 220, 240, 0.6);
            border: 2px dashed rgba(114, 189, 232, 0.7);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: all 0.2s;
        }
        .image-preview-area:hover {
            border-color: #89cff0;
            background: rgba(168, 216, 255, 0.3);
        }
        .price-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(248,252,255,0.8);
            border-radius: 60px;
            padding: 6px 8px;
            border: 1px solid rgba(114,189,232,0.5);
        }
        .price-controls button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(168,216,255,0.5);
            border: none;
            font-size: 26px;
            font-weight: 600;
            color: #33465d;
            cursor: pointer;
            transition: all 0.15s;
        }
        .price-controls button:hover {
            background: #a8d8ff;
            transform: scale(0.96);
        }
        .price-controls input {
            flex: 1;
            text-align: center;
            border: none;
            background: transparent;
            font-size: 28px;
            font-weight: 700;
            color: #1f3a4b;
            padding: 8px 0;
        }
        .submit-wish-btn {
            background: linear-gradient(135deg, #a8d8ff, #89cff0);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            color: #2c4b6e;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(114,189,232,0.4);
        }
        .submit-wish-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(114,189,232,0.5);
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .header h1 {
                font-size: 32px;
            }
            .bonus-panel {
                flex-direction: column;
                text-align: center;
            }
            .wishes-grid {
                grid-template-columns: 1fr;
            }
            .create-wish-card {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>
    <div style="display: flex; gap: 10px; position: fixed; top: 20px; left: 20px; z-index: 100;">
        <button class="back-btn" id="menu-btn" onclick="window.location.href='/'">
            ← Назад в меню
        </button>
    </div>

    <div class="container">
        <div class="header">
            <h1>Магазин желаний</h1>
            <p>Копи бонусы и исполняй свои мечты!</p>
        </div>

        <div class="bonus-panel" id="bonus-panel">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar"></div>
                <div class="user-details">
                    <h3 id="user-name">Загрузка...</h3>
                    <p id="user-role"></p>
                </div>
            </div>
            <div class="bonus-card">
                <div class="bonus-label">Мои бонусы</div>
                <div class="bonus-value" id="user-bonuses">0</div>
            </div>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab-btn active" data-tab="shop">Доступные</button>
            <button class="tab-btn" data-tab="create">✨ Новое желание</button>
            <button class="tab-btn" data-tab="history">История</button>
        </div>

        <div style="text-align: center;" id="admin-tab-container"></div>

        <div id="content-container"></div>
    </div>

    <!-- Модальное окно одобрения -->
    <div class="modal" id="approve-modal">
        <div class="modal-content">
            <h3>✅ Одобрить желание</h3>
            <input type="number" id="approve-price" placeholder="Цена в бонусах" value="50">
            <div class="modal-buttons">
                <button class="modal-cancel" id="approve-cancel">Отмена</button>
                <button class="modal-save" id="approve-confirm">Одобрить</button>
            </div>
        </div>
    </div>

    <!-- Кроппер для картинок желаний -->
    <div class="modal" id="cropper-modal">
        <div class="modal-content" style="max-width: 440px;">
            <h3>Обрезка картинки</h3>
            <div style="display:flex; justify-content:center;">
                <canvas id="cropper-canvas" width="280" height="280" style="width: 280px; height: 280px; border-radius: 22px; background: rgba(211,231,255,0.7); border: 1px solid rgba(137, 207, 240, 0.45); touch-action: none;"></canvas>
            </div>
            <div style="margin-top: 16px;">
                <label style="display:block; color: rgba(51,70,93,0.82); font-size: 13px; font-weight: 500; margin-bottom: 8px;">Масштаб</label>
                <input id="cropper-zoom" type="range" min="1" max="3" step="0.01" value="1" style="width: 100%;">
            </div>
            <div class="modal-buttons" style="margin-top: 18px;">
                <button class="modal-cancel" id="cropper-cancel">Отмена</button>
                <button class="modal-save" id="cropper-apply">Готово</button>
            </div>
        </div>
    </div>

    <script>
        let cropperState = null;
        const API_URL = window.API_URL;
        let token = localStorage.getItem('homespace_token');
        let currentUser = null;
        let wishes = [];
        let currentTab = 'shop';
        let pendingApproveWish = null;
        let localWishExtras = {};

        // Вспомогательные функции (сохранены без изменений)
        async function loadCurrentUser() { /* сохранена */
            const saved = localStorage.getItem('homespace_currentUser');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    token = localStorage.getItem('homespace_token');
                    document.getElementById('user-name').textContent = currentUser.name || 'Пользователь';
                    document.getElementById('user-avatar').innerHTML = getAvatarHtml(currentUser.avatar, currentUser.name);
                    document.getElementById('user-bonuses').textContent = currentUser.bonuses || 0;
                    let roleText = '';
                    if (currentUser.role === 'parent') roleText = 'Родитель';
                    else if (currentUser.role === 'user') roleText = 'Обычный пользователь';
                    else roleText = 'Ребёнок';
                    document.getElementById('user-role').textContent = roleText;
                    if (currentUser.role === 'parent' && currentUser.familyId) {
                        const adminTab = document.createElement('button');
                        adminTab.className = 'tab-btn';
                        adminTab.dataset.tab = 'pending';
                        adminTab.textContent = '⏳ На одобрении';
                        document.getElementById('admin-tab-container').appendChild(adminTab);
                        adminTab.addEventListener('click', () => {
                            setActiveTab('pending');
                            loadWishes();
                            renderContent();
                        });
                    }
                } catch (e) { console.error(e); }
            }
        }

        async function loadWishes() {
            try {
                let url = `${API_URL}/wishes?`;
                if (currentTab === 'shop') url += 'status=approved';
                else if (currentTab === 'pending') url += 'status=pending';
                else if (currentTab === 'history') url += 'status=purchased';
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!response.ok) throw new Error();
                wishes = await response.json();
                renderContent();
            } catch (error) { console.error(error); }
        }

        function renderContent() {
            const container = document.getElementById('content-container');
            if (currentTab === 'create') {
                renderCreateFormLight(container);
                return;
            }
            let filteredWishes = [];
            if (currentTab === 'shop') filteredWishes = wishes.filter(w => w.status === 'approved' && !w.purchased_by);
            else if (currentTab === 'pending') filteredWishes = wishes.filter(w => w.status === 'pending');
            else if (currentTab === 'history') filteredWishes = wishes.filter(w => w.status === 'purchased');
            if (filteredWishes.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><div>${currentTab === 'shop' ? 'Нет доступных желаний' : currentTab === 'pending' ? 'Нет желаний на одобрении' : 'История покупок пуста'}</div></div>`;
                return;
            }
            container.innerHTML = '<div class="wishes-grid" id="wishes-grid"></div>';
            const grid = document.getElementById('wishes-grid');
            filteredWishes.forEach(wish => {
                const canAfford = currentTab === 'shop' && (currentUser?.bonuses || 0) >= (wish.approved_price || wish.price);
                const card = document.createElement('div');
                card.className = `wish-card ${wish.status === 'pending' ? 'pending' : ''} ${wish.status === 'purchased' ? 'purchased' : ''}`;
                card.innerHTML = `
                    <div class="wish-icon">${wish.icon || '🎁'}</div>
                    <div class="wish-title">${escapeHtml(wish.title)}</div>
                    ${wish.image_url ? `<div class="wish-image"><img src="${escapeHtml(wish.image_url)}" alt="wish image" onclick="window.open('${escapeHtml(wish.image_url)}','_blank')"></div>` : ''}
                    ${wish.description ? `<div class="wish-description">${escapeHtml(wish.description)}</div>` : ''}
                    ${localWishExtras[wish.id]?.linkUrl ? `<div class="wish-link"><a href="${escapeHtml(localWishExtras[wish.id].linkUrl)}" target="_blank">Перейти к товару</a></div>` : ''}
                    <div class="wish-meta"><span class="wish-price">${wish.approved_price || wish.price}💰</span><span class="wish-creator">${escapeHtml(wish.created_by_name || 'Неизвестно')}</span><span class="wish-status ${wish.status}">${getStatusText(wish.status)}</span></div>
                    <div class="wish-actions" id="actions-${wish.id}">${renderActions(wish, canAfford)}</div>
                    <div class="wish-comments">${renderComments(wish.id)}<div style="display:flex;gap:8px;"><input id="comment-${wish.id}" type="text" placeholder="Комментарий..." style="margin:0;"><button class="approve-btn" id="comment-btn-${wish.id}" style="padding:6px 10px;">Отправить</button></div></div>
                `;
                grid.appendChild(card);
                document.getElementById(`comment-btn-${wish.id}`)?.addEventListener('click', () => addComment(wish.id));
                if (currentTab === 'shop' && !wish.purchased_by) document.getElementById(`buy-${wish.id}`)?.addEventListener('click', () => buyWish(wish));
                document.getElementById(`delete-${wish.id}`)?.addEventListener('click', () => deleteWish(wish));
                if (currentTab === 'pending') {
                    document.getElementById(`approve-${wish.id}`)?.addEventListener('click', () => showApproveModal(wish, document.getElementById(`price-${wish.id}`)?.value));
                    document.getElementById(`reject-${wish.id}`)?.addEventListener('click', () => rejectWish(wish));
                }
            });
        }

        function renderActions(wish, canAfford) {
            const canDelete = wish.created_by === currentUser?.id || currentUser?.role === 'parent';
            const deleteBtn = canDelete ? `<button class="reject-btn" id="delete-${wish.id}" style="margin-left:auto;">🗑</button>` : '';
            if (currentTab === 'shop') {
                if (canAfford) return `<button class="buy-btn" id="buy-${wish.id}">Купить</button>${deleteBtn}`;
                else return `<button class="buy-btn disabled" disabled>Не хватает ${(wish.approved_price || wish.price) - (currentUser?.bonuses || 0)}💰</button>${deleteBtn}`;
            }
            if (currentTab === 'pending') return `<input type="number" class="price-input" id="price-${wish.id}" value="${wish.approved_price || wish.price}"><button class="approve-btn" id="approve-${wish.id}">✅ Одобрить</button><button class="reject-btn" id="reject-${wish.id}">❌ Отклонить</button>${deleteBtn}`;
            if (currentTab === 'history') return `<div style="font-size:12px;">${wish.purchased_at ? new Date(wish.purchased_at).toLocaleDateString() : ''}<br>Купил: ${escapeHtml(wish.purchased_by_name || wish.created_by_name)}</div>${deleteBtn}`;
            return '';
        }

        // НОВАЯ СВЕТЛАЯ ФОРМА, ПОЛНОСТЬЮ В ЕДИНОМ СТИЛЕ
        function renderCreateFormLight(container) {
            container.innerHTML = `
                <div style="max-width: 680px; margin: 0 auto;">
                    <div class="create-wish-card">
                        <div style="text-align: center; margin-bottom: 24px;">
                            <div style="font-size: 52px;">✨</div>
                            <h3 style="color: #2c4b6e; font-size: 28px; font-weight: 700; margin-top: 4px;">Новое желание</h3>
                            <p style="color: rgba(51,70,93,0.7); font-size: 14px;">Опиши мечту — родители её увидят</p>
                        </div>
                        <div class="form-group">
                            <label>📸 Фото желания</label>
                            <div id="imagePreviewZone" class="image-preview-area" onclick="document.getElementById('wishImageFile').click()">
                                <div id="imagePlaceholderText" style="text-align:center; color:#4a627a;"><div style="font-size:40px;">🖼️</div><div>Нажмите, чтобы загрузить</div></div>
                                <img id="imagePreviewImg" style="display:none; width:100%; height:100%; object-fit:cover;" alt="preview">
                            </div>
                            <input type="file" id="wishImageFile" accept="image/*" style="display:none">
                            <input type="url" id="wishImageUrl" placeholder="Или вставьте ссылку на картинку" style="margin-top:12px; width:100%;">
                        </div>
                        <div class="form-group">
                            <label>📝 Название желания</label>
                            <input type="text" id="wishTitleInput" placeholder="Например: Новый скейтборд" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label>📄 Описание (необязательно)</label>
                            <textarea id="wishDescInput" rows="3" placeholder="Расскажи подробнее..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>🔗 Ссылка на товар (необязательно)</label>
                            <input type="url" id="wishLinkInput" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label>💰 Цена в бонусах (предложи родителям)</label>
                            <div class="price-controls">
                                <button id="priceMinusBtn">−</button>
                                <input type="number" id="wishPriceInput" value="50" step="5">
                                <button id="pricePlusBtn">+</button>
                            </div>
                        </div>
                        <button id="submitWishBtn" class="submit-wish-btn">✨ Отправить желание</button>
                    </div>
                </div>
            `;
            // Обработчики +/-
            document.getElementById('priceMinusBtn').onclick = () => { let inp = document.getElementById('wishPriceInput'); let val = parseInt(inp.value) || 50; if (val > 5) inp.value = val - 5; };
            document.getElementById('pricePlusBtn').onclick = () => { let inp = document.getElementById('wishPriceInput'); let val = parseInt(inp.value) || 50; inp.value = val + 5; };
            // Загрузка картинки с кроппером
            const fileInput = document.getElementById('wishImageFile');
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const cropped = await openCropper(file, 512);
                    document.getElementById('imagePreviewImg').src = cropped;
                    document.getElementById('imagePreviewImg').style.display = 'block';
                    document.getElementById('imagePlaceholderText').style.display = 'none';
                    // сохраним dataUrl во временное поле
                    let hiddenData = document.getElementById('croppedImageData');
                    if (!hiddenData) {
                        hiddenData = document.createElement('input');
                        hiddenData.type = 'hidden';
                        hiddenData.id = 'croppedImageData';
                        fileInput.parentNode.appendChild(hiddenData);
                    }
                    hiddenData.value = cropped;
                } catch(err) { console.warn('кроппинг отменён', err); }
            };
            document.getElementById('submitWishBtn').onclick = async () => {
                const title = document.getElementById('wishTitleInput').value.trim();
                if (!title) { alert('Введите название желания'); return; }
                let finalImage = null;
                const urlImage = document.getElementById('wishImageUrl').value.trim();
                const hiddenData = document.getElementById('croppedImageData');
                if (hiddenData?.value) finalImage = hiddenData.value;
                else if (urlImage) finalImage = urlImage;
                await createWish({
                    title: title,
                    description: document.getElementById('wishDescInput').value,
                    price: parseInt(document.getElementById('wishPriceInput').value) || 50,
                    icon: '🎁',
                    imageUrl: finalImage,
                    linkUrl: document.getElementById('wishLinkInput').value.trim()
                });
            };
        }

        async function createWish(wishData) {
            try {
                const response = await fetch(`${API_URL}/wishes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ title: wishData.title, description: wishData.description, price: wishData.price, icon: wishData.icon, image_url: wishData.imageUrl })
                });
                if (!response.ok) throw new Error(await response.text());
                const created = await response.json();
                if (created?.id) {
                    if (!localWishExtras[created.id]) localWishExtras[created.id] = { linkUrl: '', comments: [] };
                    localWishExtras[created.id].linkUrl = wishData.linkUrl || '';
                    localStorage.setItem('homespace_wish_extras', JSON.stringify(localWishExtras));
                }
                alert(currentUser?.role === 'parent' ? '✨ Желание создано!' : '✨ Желание отправлено на одобрение!');
                setActiveTab('shop');
                await loadWishes();
            } catch (error) { alert('❌ Ошибка: ' + error.message); }
        }

        async function buyWish(wish) {
            const price = wish.approved_price || wish.price;
            if ((currentUser?.bonuses || 0) < price) { alert(`Недостаточно бонусов!`); return; }
            const response = await fetch(`${API_URL}/wishes/${wish.id}/purchase`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
            if (!response.ok) throw new Error();
            const result = await response.json();
            currentUser.bonuses = result.newBalance;
            localStorage.setItem('homespace_currentUser', JSON.stringify(currentUser));
            document.getElementById('user-bonuses').textContent = result.newBalance;
            alert(`Покупка: ${wish.title}`);
            await loadWishes();
        }

        async function approveWish(wish, price) {
            await fetch(`${API_URL}/wishes/${wish.id}/approve`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ price: parseInt(price) }) });
            alert(`✅ Желание "${wish.title}" одобрено!`);
            await loadWishes();
        }
        async function rejectWish(wish) { if(confirm(`Отклонить "${wish.title}"?`)){ await fetch(`${API_URL}/wishes/${wish.id}/reject`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); await loadWishes(); } }
        async function deleteWish(wish) { if(confirm(`Удалить "${wish.title}"?`)){ await fetch(`${API_URL}/wishes/${wish.id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); await loadWishes(); } }
        function showApproveModal(wish, price) { pendingApproveWish = wish; const modal = document.getElementById('approve-modal'); document.getElementById('approve-price').value = price || wish.price || 50; modal.classList.add('active'); }
        function setActiveTab(tab) { currentTab = tab; document.querySelectorAll('.tab-btn').forEach(btn => { if(btn.dataset.tab === tab) btn.classList.add('active'); else btn.classList.remove('active'); }); loadWishes(); }
        function getStatusText(s) { return s==='approved'?'✅ Одобрено':s==='pending'?'⏳ На одобрении':'Куплено'; }
        function renderComments(wishId) { const comments = localWishExtras[wishId]?.comments || []; if(!comments.length) return '<div class="comment-row">💬 Нет комментариев</div>'; return comments.map(c => `<div class="comment-row"><b>${escapeHtml(c.author)}</b>: ${escapeHtml(c.text)}</div>`).join(''); }
        function addComment(wishId) { const input = document.getElementById(`comment-${wishId}`); const text = input?.value?.trim(); if(!text) return; if(!localWishExtras[wishId]) localWishExtras[wishId] = { linkUrl: '', comments: [] }; localWishExtras[wishId].comments.push({ author: currentUser?.name || 'Пользователь', text }); localStorage.setItem('homespace_wish_extras', JSON.stringify(localWishExtras)); renderContent(); }
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        function getAvatarHtml(avatar, name) { if(avatar && (avatar.startsWith('http')||avatar.includes('/uploads/'))) return `<img src="${escapeHtml(avatar)}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;">`; const init = (name||'U')[0].toUpperCase(); return `<span style="font-size:24px;">${init}</span>`; }
        function toSquareDataUrl(file, size=256) { return new Promise((res,rej)=>{ const reader=new FileReader(); reader.onload=()=>{ const img=new Image(); img.onload=()=>{ const side=Math.min(img.width,img.height); const canvas=document.createElement('canvas'); canvas.width=canvas.height=size; const ctx=canvas.getContext('2d'); ctx.drawImage(img,(img.width-side)/2,(img.height-side)/2,side,side,0,0,size,size); res(canvas.toDataURL('image/jpeg',0.9)); }; img.onerror=rej; img.src=reader.result; }; reader.onerror=rej; reader.readAsDataURL(file); }); }
        function openCropper(file, outSize=256) { return new Promise((resolve, reject)=>{ const modal=document.getElementById('cropper-modal'); const canvas=document.getElementById('cropper-canvas'); const zoom=document.getElementById('cropper-zoom'); if(!modal){ toSquareDataUrl(file, outSize).then(resolve).catch(reject); return; } const reader=new FileReader(); reader.onload=()=>{ const img=new Image(); img.onload=()=>{ const cw=canvas.width, ch=canvas.height; let baseScale=Math.max(cw/img.width, ch/img.height); let state={ img, cw, ch, baseScale, zoom:1, offsetX:0, offsetY:0, dragging:false, lastX:0, lastY:0 }; const draw=()=>{ const s=state.baseScale*state.zoom; const dw=img.width*s, dh=img.height*s; let dx=(cw-dw)/2+state.offsetX, dy=(ch-dh)/2+state.offsetY; dx=Math.min(0, Math.max(cw-dw, dx)); dy=Math.min(0, Math.max(ch-dh, dy)); state.offsetX=dx-(cw-dw)/2; state.offsetY=dy-(ch-dh)/2; const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,cw,ch); ctx.drawImage(img,dx,dy,dw,dh); }; const onPointerDown=(e)=>{ e.preventDefault(); canvas.setPointerCapture(e.pointerId); state.dragging=true; state.lastX=e.clientX; state.lastY=e.clientY; }; const onPointerMove=(e)=>{ if(!state.dragging) return; const dx=e.clientX-state.lastX, dy=e.clientY-state.lastY; state.lastX=e.clientX; state.lastY=e.clientY; state.offsetX+=dx; state.offsetY+=dy; draw(); }; const onPointerUp=()=>{ state.dragging=false; }; const cleanup=()=>{ canvas.removeEventListener('pointerdown',onPointerDown); canvas.removeEventListener('pointermove',onPointerMove); canvas.removeEventListener('pointerup',onPointerUp); canvas.removeEventListener('pointercancel',onPointerUp); modal.classList.remove('active'); }; canvas.addEventListener('pointerdown',onPointerDown); canvas.addEventListener('pointermove',onPointerMove); canvas.addEventListener('pointerup',onPointerUp); canvas.addEventListener('pointercancel',onPointerUp); zoom.oninput=()=>{ state.zoom=Math.max(1,Math.min(3,Number(zoom.value)||1)); draw(); }; const apply=()=>{ const outCanvas=document.createElement('canvas'); outCanvas.width=outSize; outCanvas.height=outSize; outCanvas.getContext('2d').drawImage(canvas,0,0,outSize,outSize); const dataUrl=outCanvas.toDataURL('image/jpeg',0.9); cleanup(); resolve(dataUrl); }; document.getElementById('cropper-cancel').onclick=()=>{ cleanup(); reject(new Error('cancelled')); }; document.getElementById('cropper-apply').onclick=apply; modal.classList.add('active'); draw(); }; img.src=reader.result; }; reader.readAsDataURL(file); }); }

        document.addEventListener('DOMContentLoaded', async () => {
            try { localWishExtras = JSON.parse(localStorage.getItem('homespace_wish_extras') || '{}'); } catch(e) { localWishExtras = {}; }
            await loadCurrentUser();
            if(!token || !currentUser) { window.location.href='/'; return; }
            document.getElementById('approve-cancel').onclick = () => document.getElementById('approve-modal').classList.remove('active');
            document.getElementById('approve-confirm').onclick = async () => { if(pendingApproveWish) { await approveWish(pendingApproveWish, document.getElementById('approve-price').value); document.getElementById('approve-modal').classList.remove('active'); pendingApproveWish=null; } };
            document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => setActiveTab(btn.dataset.tab)));
            await loadWishes();
        });
    </script>
</body>
